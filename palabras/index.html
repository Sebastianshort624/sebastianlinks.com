<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>333 Palabras Positivas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Barlow+Condensed:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #1B2A4A;
    --gold: #C8960C;
    --cream: #FAF8F4;
    --soft: #E8E2D9;
    --muted: #9A9490;
  }

  body {
    background: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
  }

  header {
    background: var(--navy);
    padding: 52px 24px 40px;
    text-align: center;
  }

  .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(3rem, 9vw, 5.5rem);
    color: #FFFFFF;
    line-height: 1;
    letter-spacing: 0.02em;
  }

  h1 em {
    color: var(--gold);
    font-style: italic;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: rgba(255,255,255,0.45);
    margin-top: 14px;
    letter-spacing: 0.04em;
  }

  /* MUSIC PLAYER */
  .music-bar {
    background: #13203A;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .music-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .track-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px 16px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.2s;
  }

  .track-btn:hover, .track-btn.active {
    border-color: var(--gold);
    color: var(--gold);
  }

  .vol-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
  }

  input[type=range] {
    width: 80px;
    accent-color: var(--gold);
  }

  /* CONTROLS */
  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 28px 24px 0;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 12px 26px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.78; }
  .btn-navy { background: var(--navy); color: white; }
  .btn-gold { background: var(--gold); color: white; }
  .btn-outline { background: transparent; color: var(--navy); border: 1.5px solid var(--navy); }

  .hint {
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 16px 24px 0;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 2px;
    padding: 20px 24px 40px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .word-card {
    background: white;
    padding: 20px 10px;
    text-align: center;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
  }

  .word-card:hover { background: #F0EDE8; border-color: var(--navy); }
  .word-card.playing { background: var(--navy); border-color: var(--navy); }
  .word-card.playing .word { color: var(--gold); }
  .word-card.playing .num { color: rgba(255,255,255,0.3); }

  .word {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--navy);
    display: block;
    line-height: 1.2;
  }

  .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-top: 5px;
    display: block;
  }

  /* SPOTLIGHT */
  .spotlight {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 24, 42, 0.97);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .spotlight.active { display: flex; }

  .spot-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .spot-word {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(4.5rem, 16vw, 10rem);
    color: white;
    text-align: center;
    padding: 0 32px;
    line-height: 1;
    animation: wordIn 0.5s ease;
  }

  @keyframes wordIn {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .progress-bar {
    width: min(420px, 80vw);
    height: 1px;
    background: rgba(255,255,255,0.12);
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.4s;
  }

  .spot-controls {
    display: flex;
    gap: 14px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .spt-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 20px;
    border: 1px solid rgba(255,255,255,0.25);
    background: transparent;
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    transition: all 0.15s;
  }

  .spt-btn:hover, .spt-btn.on { border-color: var(--gold); color: var(--gold); }

  footer {
    text-align: center;
    padding: 32px 24px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 1rem;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Con amor · Para ella</div>
  <h1>Palabras <em>Positivas</em></h1>
  <p class="subtitle">Recíbelas. Créelas. Son tuyas.</p>
</header>

<!-- MUSIC BAR -->
<div class="music-bar">
  <span class="music-label">🎵 Música</span>
  <button class="track-btn" onclick="playTrack(0, this)">🎋 Bambú</button>
  <button class="track-btn" onclick="playTrack(1, this)">🌊 Río</button>
  <button class="track-btn" onclick="playTrack(2, this)">🎵 Flauta</button>
  <button class="track-btn" onclick="playTrack(3, this)">🌿 Meditación</button>
  <button class="track-btn" onclick="stopMusic(this)">⏹ Silencio</button>
  <div class="vol-wrap">
    🔈
    <input type="range" id="vol" min="0" max="1" step="0.05" value="0.18" oninput="setVol(this.value)">
    🔊
  </div>
</div>

<div class="controls">
  <button class="btn btn-navy" onclick="startSlideshow()">▶ Presentación</button>
  <button class="btn btn-gold" onclick="readAll()">🔊 Leer Todo</button>
  <button class="btn btn-outline" onclick="stopAll()">⏹ Detener</button>
</div>

<div class="hint">Toca cualquier palabra para verla en pantalla completa</div>

<div class="grid" id="grid"></div>

<!-- SPOTLIGHT -->
<div class="spotlight" id="spotlight">
  <div class="spot-num" id="spotNum">1 / 333</div>
  <div class="spot-word" id="spotWord">Amor</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="spot-controls">
    <button class="spt-btn" onclick="prevWord()">← Anterior</button>
    <button class="spt-btn" id="voiceBtn" onclick="toggleVoice()">🔊 Voz</button>
    <button class="spt-btn" onclick="nextWord()">Siguiente →</button>
    <button class="spt-btn" onclick="closeSpotlight()">✕ Cerrar</button>
  </div>
</div>

<footer>Hecho con amor · sebastianlinks.com</footer>

<!-- WEB AUDIO ENGINE -->
<script>
// ── AMBIENT MUSIC via Web Audio API ──────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
let masterGain = AC.createGain();
masterGain.gain.value = 0.18;
masterGain.connect(AC.destination);

let activeNodes = [];

function stopMusic() {
  activeNodes.forEach(n => { try { n.stop(); } catch(e){} });
  activeNodes = [];
  document.querySelectorAll('.track-btn').forEach(b => b.classList.remove('active'));
}

function setVol(v) { masterGain.gain.value = parseFloat(v); }

function noise(type='pink') {
  const buf = AC.createBuffer(1, AC.sampleRate * 3, AC.sampleRate);
  const d = buf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i=0; i<d.length; i++) {
    const w = Math.random()*2-1;
    if (type==='pink') {
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
    } else { d[i]=w*0.05; }
  }
  return buf;
}

function loopNoise(buf, freq=null, q=null) {
  const src = AC.createBufferSource();
  src.buffer = buf; src.loop = true;
  if (freq) {
    const f = AC.createBiquadFilter();
    f.type='bandpass'; f.frequency.value=freq; if(q) f.Q.value=q;
    src.connect(f); f.connect(masterGain);
  } else { src.connect(masterGain); }
  src.start();
  activeNodes.push(src);
  return src;
}

function sineLoop(freq, vol=0.08, detune=0) {
  const o = AC.createOscillator();
  const g = AC.createGain();
  g.gain.value = vol;
  o.type='sine'; o.frequency.value=freq; o.detune.value=detune;
  o.connect(g); g.connect(masterGain);
  o.start(); activeNodes.push(o);
  return {osc:o, gain:g};
}

function playTone(freq, startTime, dur, vol=0.06) {
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.type='sine'; o.frequency.value=freq;
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(vol, startTime+0.08);
  g.gain.setValueAtTime(vol, startTime+dur-0.3);
  g.gain.linearRampToValueAtTime(0, startTime+dur);
  o.connect(g); g.connect(masterGain);
  o.start(startTime); o.stop(startTime+dur);
  activeNodes.push(o);
}

// Track 0 — Bamboo (rhythmic noise bursts + low tone)
function trackBamboo() {
  const buf = noise('pink');
  loopNoise(buf, 800, 3);
  loopNoise(noise('white'), 2200, 8);
  // bamboo strike rhythm
  function strike() {
    playTone(220, AC.currentTime, 1.2, 0.04);
    playTone(330, AC.currentTime+0.05, 0.8, 0.025);
    const next = 2.5 + Math.random()*3.5;
    setTimeout(strike, next*1000);
  }
  strike();
}

// Track 1 — Creek (layered noise)
function trackCreek() {
  loopNoise(noise('pink'), 600, 2);
  loopNoise(noise('pink'), 1200, 1.5);
  loopNoise(noise('white'), 3000, 5);
  // bubbles
  function bubble() {
    const f = 400 + Math.random()*600;
    playTone(f, AC.currentTime, 0.3 + Math.random()*0.4, 0.03);
    setTimeout(bubble, 300 + Math.random()*800);
  }
  bubble();
}

// Track 2 — Flute (pentatonic melody)
function trackFlute() {
  loopNoise(noise('pink'), 500, 1);
  const penta = [261.63,293.66,329.63,392,440,523.25,587.33,659.25,783.99,880];
  function note() {
    const f = penta[Math.floor(Math.random()*penta.length)];
    const oct = Math.random()>0.7 ? 2 : 1;
    playTone(f*oct, AC.currentTime, 1.2+Math.random()*1.8, 0.045);
    setTimeout(note, 1800 + Math.random()*3200);
  }
  note();
}

// Track 3 — Deep meditation (bowls + drone)
function trackMeditation() {
  sineLoop(80, 0.06);
  sineLoop(160, 0.03, 3);
  sineLoop(240, 0.02, -2);
  loopNoise(noise('pink'), 400, 1);
  const bowls = [174,285,396,417,528,639,741,852,963];
  function bowl() {
    const f = bowls[Math.floor(Math.random()*bowls.length)];
    playTone(f, AC.currentTime, 4+Math.random()*3, 0.05);
    playTone(f*2, AC.currentTime+0.1, 3+Math.random()*2, 0.025);
    setTimeout(bowl, 4000+Math.random()*5000);
  }
  bowl();
}

const tracks = [trackBamboo, trackCreek, trackFlute, trackMeditation];

function playTrack(i, btn) {
  if (AC.state === 'suspended') AC.resume();
  stopMusic();
  document.querySelectorAll('.track-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  tracks[i]();
}

let currentIndex = 0;
let slideshowTimer = null;
let voiceOn = false;

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  WORDS.forEach((w, i) => {
    const c = document.createElement('div');
    c.className = 'word-card';
    c.id = 'card-' + i;
    c.innerHTML = `<span class="word">${w}</span><span class="num">${String(i+1).padStart(3,'0')}</span>`;
    c.onclick = () => openSpotlight(i);
    grid.appendChild(c);
  });
}

function openSpotlight(i) {
  currentIndex = i;
  updateSpotlight();
  document.getElementById('spotlight').classList.add('active');
}

function closeSpotlight() {
  document.getElementById('spotlight').classList.remove('active');
  stopSlideshow();
  stopSpeech();
}

function updateSpotlight() {
  const w = WORDS[currentIndex];
  const el = document.getElementById('spotWord');
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
  el.textContent = w;
  document.getElementById('spotNum').textContent = `${currentIndex + 1} / ${WORDS.length}`;
  document.getElementById('progressFill').style.width = ((currentIndex+1)/WORDS.length*100)+'%';
  document.querySelectorAll('.word-card').forEach(c => c.classList.remove('playing'));
  const card = document.getElementById('card-'+currentIndex);
  if (card) { card.classList.add('playing'); card.scrollIntoView({block:'nearest',behavior:'smooth'}); }
  if (voiceOn) speakWord(w);
}

function nextWord() {
  if (currentIndex < WORDS.length-1) { currentIndex++; updateSpotlight(); }
  else { stopSlideshow(); }
}

function prevWord() {
  if (currentIndex > 0) { currentIndex--; updateSpotlight(); }
}

function startSlideshow() {
  openSpotlight(0);
  stopSlideshow();
  slideshowTimer = setInterval(() => {
    if (currentIndex < WORDS.length-1) { nextWord(); }
    else { stopSlideshow(); }
  }, 2400);
}

function stopSlideshow() {
  if (slideshowTimer) { clearInterval(slideshowTimer); slideshowTimer = null; }
}

function speakWord(word) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'es-ES'; u.rate = 0.78; u.pitch = 1.0;
  speechSynthesis.speak(u);
}

function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('voiceBtn');
  btn.classList.toggle('on', voiceOn);
  btn.textContent = voiceOn ? '🔊 Voz ON' : '🔊 Voz';
  if (voiceOn) speakWord(WORDS[currentIndex]);
}

function readAll() {
  if (!window.speechSynthesis) return;
  stopSpeech();
  let i = 0;
  function sayNext() {
    if (i >= WORDS.length) return;
    const u = new SpeechSynthesisUtterance(WORDS[i]);
    u.lang = 'es-ES'; u.rate = 0.75; u.pitch = 1.0;
    u.onend = () => { i++; setTimeout(sayNext, 700); };
    speechSynthesis.speak(u);
  }
  sayNext();
}

function stopSpeech() {
  if (window.speechSynthesis) speechSynthesis.cancel();
}

function stopAll() {
  stopSlideshow(); stopSpeech(); closeSpotlight();
  document.querySelectorAll('.word-card').forEach(c => c.classList.remove('playing'));
}

buildGrid();

document.addEventListener('keydown', e => {
  if (!document.getElementById('spotlight').classList.contains('active')) return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') nextWord();
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') prevWord();
  if (e.key==='Escape') closeSpotlight();
  if (e.key===' ') { e.preventDefault(); toggleVoice(); }
});
</script>
