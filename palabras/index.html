<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>333 Palabras Positivas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Barlow+Condensed:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #1B2A4A;
    --gold: #C8960C;
    --cream: #FAF8F4;
    --muted: #9A9490;
  }

  body {
    background: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
  }

  header {
    background: var(--navy);
    padding: 52px 24px 40px;
    text-align: center;
  }

  .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(3rem, 9vw, 5.5rem);
    color: #fff;
    line-height: 1;
  }

  h1 em { color: var(--gold); font-style: italic; }

  .subtitle {
    font-style: italic;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.4);
    margin-top: 14px;
  }

  /* MUSIC BAR */
  .music-bar {
    background: #0F1826;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .music-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-right: 6px;
  }

  .track-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.18);
    background: transparent;
    color: rgba(255,255,255,0.65);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .track-btn:hover, .track-btn.active {
    border-color: var(--gold);
    color: var(--gold);
  }

  .vol-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    margin-left: 10px;
  }

  input[type=range] { width: 80px; accent-color: var(--gold); }

  /* NOTE */
  .music-note {
    width: 100%;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.28);
    margin-top: 8px;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 28px 24px 0;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 12px 26px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.78; }
  .btn-navy { background: var(--navy); color: white; }
  .btn-gold { background: var(--gold); color: white; }
  .btn-outline { background: transparent; color: var(--navy); border: 1.5px solid var(--navy); }

  .hint {
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 16px 24px 0;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 2px;
    padding: 20px 24px 40px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .word-card {
    background: white;
    padding: 20px 10px;
    text-align: center;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
  }

  .word-card:hover { background: #F0EDE8; border-color: var(--navy); }
  .word-card.playing { background: var(--navy); border-color: var(--navy); }
  .word-card.playing .word { color: var(--gold); }
  .word-card.playing .num { color: rgba(255,255,255,0.3); }

  .word {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    color: var(--navy);
    display: block;
    line-height: 1.2;
  }

  .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-top: 5px;
    display: block;
  }

  /* SPOTLIGHT */
  .spotlight {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 18, 35, 0.97);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .spotlight.active { display: flex; }

  .spot-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .spot-word {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(4.5rem, 16vw, 10rem);
    color: white;
    text-align: center;
    padding: 0 32px;
    line-height: 1;
    animation: wordIn 0.6s ease;
  }

  @keyframes wordIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .progress-bar {
    width: min(420px, 80vw);
    height: 1px;
    background: rgba(255,255,255,0.1);
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.4s;
  }

  .spot-controls {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .spt-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 20px;
    border: 1px solid rgba(255,255,255,0.22);
    background: transparent;
    color: rgba(255,255,255,0.75);
    cursor: pointer;
    transition: all 0.15s;
  }

  .spt-btn:hover, .spt-btn.on { border-color: var(--gold); color: var(--gold); }

  footer {
    text-align: center;
    padding: 32px 24px;
    font-style: italic;
    color: var(--muted);
    font-size: 1rem;
  }

  /* hidden YouTube iframe */
  #yt-frame { position:fixed; width:1px; height:1px; opacity:0; pointer-events:none; left:-9999px; }
</style>

<style id="mob">

  .goal-pill{font-size:11px!important;padding:3px 10px!important}

<body>

<header>
  <div class="eyebrow">Con amor · Para ella</div>
  <h1>Palabras <em>Positivas</em></h1>
  <p class="subtitle">Recíbelas. Créelas. Son tuyas.</p>
</header>

<!-- MUSIC BAR -->
<div class="music-bar">
  <span class="music-label">🎵 Música de fondo</span>
  <button class="track-btn" id="btn-0" onclick="playTrack(0)">🎋 Bambú & Agua</button>
  <button class="track-btn" id="btn-1" onclick="playTrack(1)">🌊 Río</button>
  <button class="track-btn" id="btn-2" onclick="playTrack(2)">🎵 Flauta</button>
  <button class="track-btn" id="btn-3" onclick="playTrack(3)">🔔 Cuencos</button>
  <button class="track-btn" id="btn-stop" onclick="stopMusic()">⏹ Silencio</button>
  <div class="vol-wrap">
    🔈
    <input type="range" id="vol" min="0" max="100" step="5" value="20" oninput="setVol(this.value)">
    🔊
  </div>
  <div class="music-note">La música no interrumpe la voz — corren juntas</div>
</div>

<div class="controls">
  <button class="btn btn-navy" onclick="startSlideshow()">▶ Presentación</button>
  <button class="btn btn-gold" onclick="readAll()">🔊 Leer Todo</button>
  <button class="btn btn-outline" onclick="stopAll()">⏹ Detener</button>
</div>

<div class="hint">Toca cualquier palabra para verla en pantalla completa</div>

<div class="grid" id="grid"></div>

<div class="spotlight" id="spotlight">
  <div class="spot-num" id="spotNum">1 / 333</div>
  <div class="spot-word" id="spotWord">Amor</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="spot-controls">
    <button class="spt-btn" onclick="prevWord()">← Anterior</button>
    <button class="spt-btn" id="voiceBtn" onclick="toggleVoice()">🔊 Voz</button>
    <button class="spt-btn" onclick="nextWord()">Siguiente →</button>
    <button class="spt-btn" onclick="closeSpotlight()">✕ Cerrar</button>
  </div>
</div>

<footer>Hecho con amor · sebastianlinks.com</footer>

<!-- Hidden YouTube player for background music -->
<div id="yt-frame"></div>

<script>
// ── YouTube IFrame API ────────────────────────────────────────────
// Calm ambient tracks (looping playlists / long ambient videos)
const TRACKS = [
  'jfKfPfyJRdk', // lofi / bamboo calm — Lofi Girl
  'DWcJFNfaw9c', // river creek nature sounds
  'AoHkBiSgXAc', // native american flute meditation
  '77ZozI0rw7w', // tibetan singing bowls 8hr
];

let ytPlayer = null;
let currentTrack = -1;

function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('yt-frame', {
    height: '1', width: '1',
    videoId: TRACKS[0],
    playerVars: { autoplay: 0, loop: 1, controls: 0, mute: 0 },
    events: { onReady: () => {} }
  });
}

// Load YouTube API
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

function playTrack(i) {
  document.querySelectorAll('.track-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-'+i).classList.add('active');
  if (!ytPlayer) return;
  currentTrack = i;
  ytPlayer.loadVideoById({ videoId: TRACKS[i] });
  ytPlayer.setVolume(parseInt(document.getElementById('vol').value));
  ytPlayer.playVideo();
}

function stopMusic() {
  document.querySelectorAll('.track-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-stop').classList.add('active');
  if (ytPlayer) ytPlayer.pauseVideo();
}

function setVol(v) {
  if (ytPlayer) ytPlayer.setVolume(parseInt(v));
}

// ── WORDS ────────────────────────────────────────────────────────
const WORDS = [
  "Amor","Fe","Paz","Luz","Vida","Bien","Dios","Gracia","Gozo","Gloria",
  "Fuerza","Salud","Alegría","Esperanza","Bondad","Perdón","Virtud","Valor",
  "Pureza","Verdad","Honra","Dignidad","Belleza","Ternura","Nobleza","Calma",
  "Serenidad","Armonía","Plenitud","Libertad","Abundancia","Riqueza","Éxito",
  "Triunfo","Victoria","Logro","Talento","Sabiduría","Inteligencia","Claridad",
  "Visión","Propósito","Misión","Pasión","Creatividad","Inspiración","Motivación",
  "Determinación","Disciplina","Constancia","Perseverancia","Esfuerzo","Compromiso",
  "Dedicación","Entrega","Responsabilidad","Integridad","Lealtad","Fidelidad",
  "Confianza","Seguridad","Certeza","Firmeza","Estabilidad","Equilibrio","Bienestar",
  "Prosperidad","Crecimiento","Progreso","Evolución","Madurez","Renovación",
  "Transformación","Resiliencia","Superación","Excelencia","Grandeza","Magnificencia",
  "Esplendor","Maravilla","Milagro","Bendición","Protección","Cuidado","Compasión",
  "Empatía","Generosidad","Hospitalidad","Servicio","Solidaridad","Unidad","Familia",
  "Amistad","Comunidad","Pertenencia","Conexión","Vínculo","Corazón","Alma",
  "Espíritu","Consciencia","Presencia","Atención","Gratitud","Apreciación",
  "Reconocimiento","Celebración","Júbilo","Entusiasmo","Energía","Vitalidad",
  "Juventud","Frescura","Purificación","Transparencia","Sencillez","Humildad",
  "Mansedumbre","Paciencia","Tolerancia","Aceptación","Comprensión","Escucha",
  "Diálogo","Apertura","Flexibilidad","Adaptación","Ingenio","Perspicacia",
  "Profundidad","Amplitud","Infinito","Eterno","Divino","Sagrado","Celestial",
  "Sublime","Trascendente","Aurora","Amanecer","Horizonte","Destino","Camino",
  "Sendero","Guía","Dirección","Orientación","Meta","Sueño","Anhelo","Voluntad",
  "Elección","Decisión","Acción","Impulso","Iniciativa","Audacia","Valentía",
  "Coraje","Heroísmo","Liderazgo","Influencia","Impacto","Legado","Memoria",
  "Honor","Carácter","Identidad","Autenticidad","Originalidad","Singularidad",
  "Esencia","Naturaleza","Magnetismo","Carisma","Elegancia","Refinamiento",
  "Distinción","Estilo","Donaire","Encanto","Magia","Misterio","Contemplación",
  "Meditación","Oración","Devoción","Reverencia","Adoración","Alabanza","Santidad",
  "Consagración","Vocación","Llamado","Sentido","Significado","Permanencia",
  "Solidez","Fundamento","Raíz","Origen","Principio","Inicio","Nacimiento",
  "Creación","Formación","Desarrollo","Florecimiento","Cosecha","Fruto","Resultado",
  "Recompensa","Premio","Validación","Afirmación","Aprobación","Apoyo","Aliento",
  "Ánimo","Estímulo","Defensor","Protector","Salvador","Restaurador","Sanador",
  "Maestro","Mentor","Consejero","Hermano","Compañero","Aliado","Equipo","Pueblo",
  "Humanidad","Universo","Cosmos","Tierra","Agua","Fuego","Aire","Calor","Abrigo",
  "Hogar","Raíces","Herencia","Tradición","Cultura","Historia","Promesa","Pacto",
  "Alianza","Misericordia","Justicia","Rectitud","Reposo","Descanso","Quietud",
  "Silencio","Asombro","Admiración","Deleite","Satisfacción","Contentamiento",
  "Felicidad","Dicha","Bienaventuranza","Completo","Perfecto","Bendito","Santo",
  "Amado","Elegido","Ungido","Favorecido","Aceptado","Perdonado","Liberado",
  "Adoptado","Heredero","Testigo","Mensajero","Sal","Semilla","Árbol","Río",
  "Manantial","Resurrección","Redención","Reconciliación","Restauración","Revelación",
  "Preciosa","Querida","Especial","Única","Valiosa","Irremplazable","Necesaria",
  "Recordada","Amada","Sostenida","Abrazada","Vista","Conocida","Escogida",
  "Cubierta","Guardada","Cuidada","Honrada","Celebrada","Apreciada","Atesorada",
  "Reconocida","Admirada","Respetada","Adorada","Consolada","Fortalecida",
  "Levantada","Completada","Plena","Suficiente","Digna","Noble","Pura","Santa",
  "Gloriosa","Luminosa","Radiante","Floreciente","Tranquila","Serena","Entera",
  "Segura","Confiada","Descansada","Libre","Perdonada","Nueva","Renovada",
  "Transformada","Restaurada","Sanada","Liberada","Redimida","Rescatada","Amada"
];

let currentIndex = 0;
let slideshowTimer = null;
let voiceOn = false;
let speaking = false;

// ── VOICE ─────────────────────────────────────────────────────────
// Pick best Spanish female voice available on device
function getBestVoice() {
  const voices = speechSynthesis.getVoices();
  // Priority: es-US female, es-MX female, es-ES female, any es-
  const prefer = [
    v => v.lang === 'es-US' && v.name.toLowerCase().includes('paulina'),
    v => v.lang === 'es-MX' && /female|woman|paulina|fernanda|renata/i.test(v.name),
    v => v.lang === 'es-US',
    v => v.lang === 'es-MX',
    v => v.lang.startsWith('es'),
  ];
  for (const test of prefer) {
    const found = voices.find(test);
    if (found) return found;
  }
  return null;
}

function speakWord(word, onDone) {
  if (!window.speechSynthesis) { if(onDone) onDone(); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'es-US';
  u.rate = 0.62;      // slow and deliberate
  u.pitch = 1.05;     // slightly warm
  u.volume = 1.0;
  const v = getBestVoice();
  if (v) u.voice = v;
  u.onend = () => { speaking = false; if (onDone) onDone(); };
  u.onerror = () => { speaking = false; if (onDone) onDone(); };
  speaking = true;
  speechSynthesis.speak(u);
}

// ── GRID ──────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  WORDS.forEach((w, i) => {
    const c = document.createElement('div');
    c.className = 'word-card';
    c.id = 'card-' + i;
    c.innerHTML = `<span class="word">${w}</span><span class="num">${String(i+1).padStart(3,'0')}</span>`;
    c.onclick = () => openSpotlight(i);
    grid.appendChild(c);
  });
}

// ── SPOTLIGHT ─────────────────────────────────────────────────────
function openSpotlight(i) {
  currentIndex = i;
  updateSpotlight();
  document.getElementById('spotlight').classList.add('active');
}

function closeSpotlight() {
  document.getElementById('spotlight').classList.remove('active');
  stopSlideshow();
  speechSynthesis.cancel();
}

function updateSpotlight() {
  const w = WORDS[currentIndex];
  const el = document.getElementById('spotWord');
  el.style.animation = 'none'; el.offsetHeight; el.style.animation = '';
  el.textContent = w;
  document.getElementById('spotNum').textContent = `${currentIndex+1} / ${WORDS.length}`;
  document.getElementById('progressFill').style.width = ((currentIndex+1)/WORDS.length*100)+'%';
  document.querySelectorAll('.word-card').forEach(c => c.classList.remove('playing'));
  const card = document.getElementById('card-'+currentIndex);
  if (card) { card.classList.add('playing'); card.scrollIntoView({block:'nearest',behavior:'smooth'}); }
  if (voiceOn) speakWord(w);
}

function nextWord() {
  if (currentIndex < WORDS.length-1) { currentIndex++; updateSpotlight(); }
  else { stopSlideshow(); }
}

function prevWord() {
  if (currentIndex > 0) { currentIndex--; updateSpotlight(); }
}

// ── SLIDESHOW ─────────────────────────────────────────────────────
function startSlideshow() {
  openSpotlight(0);
  stopSlideshow();
  slideshowTimer = setInterval(() => {
    if (currentIndex < WORDS.length-1) { nextWord(); }
    else { stopSlideshow(); }
  }, 2800);
}

function stopSlideshow() {
  if (slideshowTimer) { clearInterval(slideshowTimer); slideshowTimer = null; }
}

// ── READ ALL — voice leads, waits between words ───────────────────
function readAll() {
  speechSynthesis.cancel();
  stopSlideshow();
  openSpotlight(0);
  let i = 0;

  function sayNext() {
    if (i >= WORDS.length) return;
    currentIndex = i;
    updateSpotlight();
    speakWord(WORDS[i], () => {
      i++;
      // 1.1 second pause between words — feels meditative
      setTimeout(sayNext, 1100);
    });
  }
  sayNext();
}

function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('voiceBtn');
  btn.classList.toggle('on', voiceOn);
  btn.textContent = voiceOn ? '🔊 Voz ON' : '🔊 Voz';
  if (voiceOn) speakWord(WORDS[currentIndex]);
}

function stopAll() {
  stopSlideshow();
  speechSynthesis.cancel();
  closeSpotlight();
  document.querySelectorAll('.word-card').forEach(c => c.classList.remove('playing'));
}

buildGrid();

// Preload voices
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('spotlight').classList.contains('active')) return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') nextWord();
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') prevWord();
  if (e.key==='Escape') closeSpotlight();
  if (e.key===' ') { e.preventDefault(); toggleVoice(); }
});
</script>
</body>
</html>
