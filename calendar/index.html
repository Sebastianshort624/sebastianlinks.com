<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sebastian — Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f4f6fa;min-height:100vh}
.header{background:linear-gradient(135deg,#1B2A4A,#243a6e);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:.3px}
.header p{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
.header-right{display:flex;gap:10px;align-items:center}
.btn{padding:8px 16px;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.btn-gold{background:#C8960C;color:#fff}
.btn-gold:hover{background:#b8860b}
.cal-wrap{padding:20px;max-width:1100px;margin:0 auto}
.cal-card{background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.cal-inner{padding:0}
.cal-inner iframe{display:block;width:100%;height:680px;border:none}
.footer-note{text-align:center;font-size:11px;color:#9ca3af;padding:12px;margin-top:4px}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📅 Sebastian Short — Calendar</h1>
    <p>sebastian@alphatimeshareconsultants.com &nbsp;·&nbsp; Eastern Time</p>
  </div>
  <div class="header-right">
    <a href="https://calendar.google.com/calendar/r" target="_blank">
      <button class="btn btn-gold">Open in Google Calendar ↗</button>
    </a>
  </div>
</div>

<div class="cal-wrap">
  <div class="cal-card">
    <div class="cal-inner">
      <iframe src="https://calendar.google.com/calendar/embed?src=sebastian%40alphatimeshareconsultants.com&ctz=America%2FNew_York&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=1&showCalendars=1&showTz=1" style="border:0" width="100%" height="680" frameborder="0" scrolling="no"></iframe>
    </div>
  </div>
  <div class="footer-note">Live sync with Google Calendar · Updates automatically · All times in Eastern</div>
</div>

</body>
</html>
