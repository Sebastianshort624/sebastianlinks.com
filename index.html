<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Greenville — My Town</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Inter,sans-serif;background:#8bc34a;overflow:hidden;height:100vh;width:100vw;touch-action:none;user-select:none;-webkit-user-select:none;overscroll-behavior:none}

/* NAV */
.nav{background:rgba(255,255,255,.93);padding:0 12px;height:46px;display:flex;align-items:center;gap:6px;border-bottom:2px solid #a5d06a;position:relative;z-index:1000;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nav-logo{font-family:Nunito,sans-serif;font-size:15px;font-weight:900;color:#2d5a1a;white-space:nowrap;margin-right:4px}
.nb{background:#fff;border:2px solid #a5d06a;color:#2d5a1a;border-radius:14px;padding:4px 12px;font-size:11px;font-weight:800;cursor:pointer;font-family:Nunito,sans-serif;white-space:nowrap;flex-shrink:0;transition:.15s}
.nb:hover,.nb.on{background:#2d5a1a;color:#fff;border-color:#2d5a1a}
.nb.gold{border-color:#f0a020;color:#8a5500;background:#fff8e0}
.nb.gold:hover,.nb.gold.on{background:#f0a020;color:#fff}
.nb.red{border-color:#e04040;color:#a00000}
.nb.red:hover{background:#e04040;color:#fff}

/* CANVAS */
.canvas{position:absolute;top:46px;left:0;right:0;bottom:0;overflow:hidden}

/* WORLD — parchment/grass map feel */
.world{position:absolute;width:2200px;height:1600px;transform-origin:0 0;background:#7ab648}

/* NPC */
.npc{position:absolute;font-size:16px;pointer-events:none;z-index:8;line-height:1}
@keyframes goR{from{left:-80px}to{left:2280px}}
@keyframes goL{from{left:2280px}to{left:-80px}}
@keyframes goD{from{top:-80px}to{top:1680px}}
@keyframes goU{from{top:1680px}to{top:-80px}}
@keyframes wander{0%,100%{margin-left:0;margin-top:0}25%{margin-left:50px;margin-top:-25px}50%{margin-left:90px;margin-top:15px}75%{margin-left:35px;margin-top:45px}}

/* BUILDINGS — outline style */
.bld{position:absolute;background:rgba(255,255,255,.9);border-radius:14px;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;text-align:center;padding:8px 6px;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:.18s;backdrop-filter:blur(2px)}
.bld:active{transform:scale(.96)}
.bld.lifted{transform:scale(1.1) rotate(1deg)!important;box-shadow:0 16px 32px rgba(0,0,0,.3)!important;z-index:900!important}
.bld.wiggling{animation:jiggle .22s ease-in-out infinite}
@keyframes jiggle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.bld-icon{font-size:26px;line-height:1;flex-shrink:0}
.bld-name{font-family:Nunito,sans-serif;font-size:10px;font-weight:900;line-height:1.25;color:#1a1a2e}
.bld-sub{font-size:8px;font-weight:700;line-height:1.2;opacity:.6;color:#333}
.bld-rooms{font-size:8px;font-weight:800;background:rgba(0,0,0,.1);border-radius:100px;padding:1px 6px;color:#333}
/* Delete & resize in wiggle */
.bld-del{display:none;position:absolute;top:-10px;left:-10px;width:20px;height:20px;background:#ff3b30;border:2px solid #fff;border-radius:50%;color:#fff;font-size:13px;font-weight:900;align-items:center;justify-content:center;z-index:20;cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.bld.wiggling .bld-del{display:flex}

/* DECO */
.deco{position:absolute;font-size:22px;pointer-events:none;z-index:6;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.2))}
.deco.movable{pointer-events:auto;cursor:grab;animation:jiggle .22s ease-in-out infinite}

/* SIGN */
.sign{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:move;z-index:25}
.sign-board{background:#1a6b1a;color:#fff;font-family:Nunito,sans-serif;font-size:10px;font-weight:900;padding:3px 10px;border-radius:3px;border:2px solid #0f4a0f;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;box-shadow:2px 2px 0 rgba(0,0,0,.25)}
.sign-post{width:3px;height:18px;background:#888}

/* BULLETIN */
.bulletin{position:absolute;width:30px;height:28px;background:#92400e;border:2px solid #78350f;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;z-index:20;box-shadow:2px 2px 0 rgba(0,0,0,.2)}
.bulletin::after{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:3px;height:7px;background:#777;border-radius:2px}

/* WIGGLE BANNER */
.wiggle-banner{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#ff9500;color:#fff;border-radius:100px;padding:8px 20px;font-size:13px;font-weight:800;z-index:2000;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);font-family:Nunito,sans-serif;white-space:nowrap}
.wiggle-banner.show{display:block}

/* ZOOM HUD */
.zoom-hud{position:fixed;bottom:16px;right:56px;background:rgba(0,0,0,.55);color:#fff;border-radius:100px;padding:4px 12px;font-size:11px;font-weight:700;z-index:2000;pointer-events:none;opacity:0;transition:opacity .5s}
.zoom-hud.show{opacity:1}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:3000;align-items:center;justify-content:center;padding:14px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:18px;width:460px;max-width:96vw;max-height:86vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.modal-hdr{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.modal-hdr-icon{font-size:26px}
.modal-hdr-name{font-family:Nunito,sans-serif;font-size:17px;font-weight:900;color:#1a1a2e;flex:1}
.modal-x{background:#f3f4f6;border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer}
.modal-body{overflow-y:auto;padding:14px 16px 18px;flex:1}
.m-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;margin-bottom:7px}
.m-divider{height:1px;background:#f0f0f0;margin:10px 0}
.room-row{display:flex;align-items:center;gap:10px;background:#f8faf5;border:2px solid #d4ecc0;border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;text-decoration:none;transition:.15s}
.room-row:hover{border-color:#2d6a2d;background:#f0fdf0}
.room-icon{font-size:20px;flex-shrink:0}
.room-name{font-family:Nunito,sans-serif;font-size:13px;font-weight:800;color:#1a1a2e;flex:1}
.room-desc{font-size:10px;color:#6b7280}
.room-eject{background:none;border:1px solid #fca5a5;color:#dc2626;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0}
.note-ta{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:8px;font-family:Inter,sans-serif;font-size:13px;resize:none;min-height:56px;outline:none;color:#1a1a2e}
.note-ta:focus{border-color:#2d6a2d}
.note-add{background:#2d6a2d;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-family:Nunito,sans-serif;font-size:12px;font-weight:800;cursor:pointer;margin-top:5px}
.note-item{background:#f8faf5;border:1px solid #e5e7eb;border-radius:7px;padding:7px 10px;margin-bottom:5px;display:flex;gap:8px;align-items:flex-start;font-size:12px;color:#374151}
.task-row{display:flex;align-items:center;gap:7px;padding:8px 0;border-bottom:1px solid #f3f4f6;cursor:pointer}
.task-cb{width:17px;height:17px;border-radius:4px;border:2px solid #d1d5db;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.task-row.done .task-cb{background:#16a34a;border-color:#16a34a;color:#fff}
.task-row.done .task-text{text-decoration:line-through;color:#9ca3af}
.task-text{font-size:12px;font-weight:600;flex:1;color:#374151}
.task-due{font-size:9px;font-weight:700;padding:2px 6px;border-radius:100px}
.task-due.today{background:#fee2e2;color:#dc2626}
.task-due.soon{background:#fef3c7;color:#d97706}
.task-due.ok{background:#dcfce7;color:#16a34a}
.task-add-row{display:flex;gap:5px;margin-top:8px}
.task-input{flex:1;border:1.5px solid #e5e7eb;border-radius:7px;padding:6px 9px;font-family:Inter,sans-serif;font-size:12px;outline:none;color:#1a1a2e}
.task-date{border:1.5px solid #e5e7eb;border-radius:7px;padding:6px;font-size:11px;font-family:Inter,sans-serif;outline:none;color:#374151;width:116px}
.task-add-btn{background:#2d6a2d;color:#fff;border:none;border-radius:7px;padding:6px 10px;font-weight:800;cursor:pointer;font-size:14px}
.confirm-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:5000;align-items:center;justify-content:center;padding:20px}
.confirm-bg.open{display:flex}
.confirm-box{background:#fff;border-radius:16px;padding:22px;max-width:290px;width:100%;text-align:center;box-shadow:0 16px 40px rgba(0,0,0,.2)}
.confirm-title{font-family:Nunito,sans-serif;font-size:15px;font-weight:900;color:#1a1a2e;margin-bottom:6px}
.confirm-msg{font-size:12px;color:#6b7280;margin-bottom:16px;line-height:1.5}
.confirm-btns{display:flex;gap:8px}
.cbtn{flex:1;border:none;border-radius:8px;padding:10px;font-family:Nunito,sans-serif;font-size:13px;font-weight:800;cursor:pointer}
.cbtn.yes{background:#2d6a2d;color:#fff}.cbtn.no{background:#f3f4f6;color:#374151}
.rv-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.rv-name{font-weight:700;color:#1a1a2e;flex:1}
.rv-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:100px;cursor:pointer}
.rv-tag.want{background:#fef3c7;color:#92400e}
.rv-tag.been{background:#dcfce7;color:#14532d}
.rv-map{font-size:11px;padding:2px 6px;border:1px solid #d1d5db;border-radius:5px;text-decoration:none;color:#6b7280;flex-shrink:0}
.ev-row{background:#f8faf5;border:1px solid #d4ecc0;border-radius:9px;padding:9px;margin-bottom:7px;display:flex;gap:8px;align-items:center}
.ev-date-box{background:#2d6a2d;color:#fff;border-radius:7px;padding:3px 7px;font-size:10px;font-weight:800;text-align:center;min-width:36px}
.ev-name{font-size:12px;font-weight:700;color:#1a1a2e}
.ev-venue{font-size:10px;color:#6b7280}
.add-ev{background:#f0f9e8;border:1px solid #d4ecc0;border-radius:9px;padding:10px;margin-top:8px;display:flex;flex-direction:column;gap:6px}
.ev-inp{border:1.5px solid #d4ecc0;border-radius:7px;padding:7px;font-family:Inter,sans-serif;font-size:12px;outline:none;color:#1a1a2e;width:100%}
.ce-btn{display:flex;align-items:center;gap:10px;background:#f8faf5;border:2px solid #d4ecc0;border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:.15s}
.ce-btn:hover{border-color:#2d6a2d;background:#f0fdf0}
.ce-icon{font-size:20px;flex-shrink:0}
.ce-name{font-family:Nunito,sans-serif;font-size:13px;font-weight:800;color:#1a1a2e;flex:1}
.ce-desc{font-size:10px;color:#6b7280}
.ap-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:6px}
.ap-item{background:#f8faf5;border:1.5px solid #d4ecc0;border-radius:8px;padding:7px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:9px;font-weight:700;color:#1d4a1d;text-align:center;transition:.12s}
.ap-item:hover{border-color:#2d6a2d;background:#f0fdf0}
.ap-icon{font-size:18px}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">🏘 Greenville</div>
  <button class="nb" onclick="zoomFit()">⊡ Fit</button>
  <button class="nb" onclick="zoom(0.25)">＋</button>
  <button class="nb" onclick="zoom(-0.25)">－</button>
  <button class="nb gold on" id="edit-btn" onclick="toggleEdit()">✏️ Edit</button>
  <button class="nb" onclick="openCivilEng()">⚙️</button>
  <a href="https://alphafiles.net/vitals/" class="nb">⚡ ATC</a>
  <button class="nb red" onclick="hardRefresh()">↺</button>
</nav>

<!-- WIGGLE BANNER -->
<div class="wiggle-banner" id="wiggle-banner" onclick="exitEdit()">✅ Tap here to lock town</div>
<!-- ZOOM HUD -->
<div class="zoom-hud" id="zoom-hud"></div>

<!-- CANVAS -->
<div class="canvas" id="canvas">
<div class="world" id="world">

<!-- ══════════════════════════════════════════════════ -->
<!-- BACKGROUND LAYER — Mountains, forest, stream      -->
<!-- ══════════════════════════════════════════════════ -->
<svg style="position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none" viewBox="0 0 2200 1600" preserveAspectRatio="xMidYMid slice">

  <!-- Ground gradient -->
  <defs>
    <radialGradient id="grd" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8fcc52"/>
      <stop offset="100%" stop-color="#6ba832"/>
    </radialGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="2200" height="1600" fill="url(#grd)"/>

  <!-- MOUNTAIN RANGES — left cliffs -->
  <polygon points="0,400 120,180 240,280 300,100 420,300 480,200 520,420 0,420" fill="#7a6858" opacity=".85"/>
  <polygon points="0,420 120,200 240,300 300,120 420,320 480,220 520,440 520,600 0,600" fill="#8a7868" opacity=".7"/>
  <polygon points="0,380 80,200 160,260 220,120 340,280 400,180 440,360" fill="#9a8878" opacity=".5"/>
  <!-- Snow caps -->
  <polygon points="300,100 280,130 320,130" fill="#fff" opacity=".7"/>
  <polygon points="120,180 105,205 135,205" fill="#fff" opacity=".6"/>
  <polygon points="480,200 468,222 492,222" fill="#fff" opacity=".6"/>

  <!-- MOUNTAIN RANGES — right cliffs -->
  <polygon points="2200,300 2080,120 1960,240 1880,80 1760,280 1700,160 1650,360 2200,360" fill="#7a6858" opacity=".85"/>
  <polygon points="2200,360 2080,140 1960,260 1880,100 1760,300 1700,180 1650,380 1650,560 2200,560" fill="#8a7868" opacity=".7"/>
  <!-- Snow caps right -->
  <polygon points="1880,80 1862,108 1898,108" fill="#fff" opacity=".7"/>
  <polygon points="2080,120 2065,145 2095,145" fill="#fff" opacity=".6"/>

  <!-- TOP mountain / cliff edge -->
  <polygon points="600,0 720,80 840,30 960,100 1080,20 1200,90 1320,10 1440,80 1560,0" fill="#7a6858" opacity=".6"/>
  <polygon points="600,0 720,60 840,10 960,80 1080,0 1200,70 1320,0 1440,60 1560,0 1560,-10 600,-10" fill="#6a5848" opacity=".55"/>

  <!-- BOTTOM cliffs -->
  <polygon points="400,1600 520,1480 640,1540 760,1420 880,1500 1000,1440 1100,1560 1200,1460 1320,1540 1440,1470 1560,1520 1680,1430 1800,1600" fill="#6a5848" opacity=".55"/>

  <!-- STREAM / RIVER — organic winding path -->
  <path d="M 180 1600 Q 280 1450 350 1300 Q 420 1150 480 1000 Q 540 860 580 720 Q 620 600 700 520 Q 780 440 860 380 Q 940 320 1000 240 Q 1060 160 1100 60" stroke="#4ab8d8" stroke-width="22" fill="none" stroke-linecap="round" opacity=".8"/>
  <path d="M 180 1600 Q 280 1450 350 1300 Q 420 1150 480 1000 Q 540 860 580 720 Q 620 600 700 520 Q 780 440 860 380 Q 940 320 1000 240 Q 1060 160 1100 60" stroke="#7ed4f0" stroke-width="8" fill="none" stroke-linecap="round" opacity=".5" stroke-dasharray="28,20"/>
  <!-- Stream shimmer -->
  <path d="M 420 1100 Q 460 1060 500 1040" stroke="#fff" stroke-width="3" fill="none" opacity=".35" stroke-linecap="round"/>
  <path d="M 620 760 Q 650 730 680 720" stroke="#fff" stroke-width="3" fill="none" opacity=".35" stroke-linecap="round"/>
  <path d="M 810 500 Q 840 470 870 460" stroke="#fff" stroke-width="3" fill="none" opacity=".35" stroke-linecap="round"/>

  <!-- BRIDGE over stream (where main road crosses) -->
  <rect x="555" y="695" width="55" height="50" rx="4" fill="#c8a86a" opacity=".95"/>
  <rect x="558" y="698" width="49" height="8" rx="2" fill="#e8c880" opacity=".8"/>
  <rect x="558" y="735" width="49" height="8" rx="2" fill="#e8c880" opacity=".8"/>
  <!-- Bridge railings -->
  <line x1="562" y1="698" x2="562" y2="742" stroke="#a08040" stroke-width="2" opacity=".7"/>
  <line x1="572" y1="698" x2="572" y2="742" stroke="#a08040" stroke-width="2" opacity=".7"/>
  <line x1="582" y1="698" x2="582" y2="742" stroke="#a08040" stroke-width="2" opacity=".7"/>
  <line x1="592" y1="698" x2="592" y2="742" stroke="#a08040" stroke-width="2" opacity=".7"/>
  <line x1="600" y1="698" x2="600" y2="742" stroke="#a08040" stroke-width="2" opacity=".7"/>

  <!-- SECOND BRIDGE (smaller path crossing stream) -->
  <rect x="825" y="395" width="42" height="36" rx="3" fill="#c8a86a" opacity=".9"/>
  <line x1="830" y1="396" x2="830" y2="430" stroke="#a08040" stroke-width="1.5" opacity=".7"/>
  <line x1="838" y1="396" x2="838" y2="430" stroke="#a08040" stroke-width="1.5" opacity=".7"/>
  <line x1="846" y1="396" x2="846" y2="430" stroke="#a08040" stroke-width="1.5" opacity=".7"/>
  <line x1="854" y1="396" x2="854" y2="430" stroke="#a08040" stroke-width="1.5" opacity=".7"/>
  <line x1="860" y1="396" x2="860" y2="430" stroke="#a08040" stroke-width="1.5" opacity=".7"/>

  <!-- FOREST ZONES — tree clusters at edges -->
  <!-- Top-left forest -->
  <ellipse cx="240" cy="350" rx="180" ry="150" fill="#3a7a20" opacity=".6"/>
  <ellipse cx="220" cy="340" rx="140" ry="110" fill="#4a9a28" opacity=".5"/>

  <!-- Top-right forest -->
  <ellipse cx="1900" cy="300" rx="200" ry="160" fill="#3a7a20" opacity=".6"/>
  <ellipse cx="1920" cy="290" rx="160" ry="120" fill="#4a9a28" opacity=".5"/>

  <!-- Bottom-left forest -->
  <ellipse cx="180" cy="1300" rx="160" ry="140" fill="#3a7a20" opacity=".6"/>
  <!-- Bottom-right forest -->
  <ellipse cx="2020" cy="1300" rx="180" ry="150" fill="#3a7a20" opacity=".6"/>

  <!-- ORGANIC ROADS — curved, not straight grid -->
  <!-- Main road: curves from bottom-left to top-right -->
  <path d="M 100 1400 Q 300 1200 500 1000 Q 640 860 700 720 Q 780 560 900 440 Q 1020 320 1200 220 Q 1360 130 1600 80 Q 1800 40 2100 60" stroke="#c8b898" stroke-width="32" fill="none" stroke-linecap="round" opacity=".9"/>
  <path d="M 100 1400 Q 300 1200 500 1000 Q 640 860 700 720 Q 780 560 900 440 Q 1020 320 1200 220 Q 1360 130 1600 80 Q 1800 40 2100 60" stroke="#e8d8b8" stroke-width="6" fill="none" stroke-dasharray="30,22" stroke-linecap="round" opacity=".7"/>

  <!-- Cross road: east-west with curve -->
  <path d="M 60 600 Q 300 560 560 540 Q 780 520 980 480 Q 1180 440 1380 400 Q 1580 360 1800 300 Q 1980 250 2180 200" stroke="#c8b898" stroke-width="28" fill="none" stroke-linecap="round" opacity=".9"/>
  <path d="M 60 600 Q 300 560 560 540 Q 780 520 980 480 Q 1180 440 1380 400 Q 1580 360 1800 300 Q 1980 250 2180 200" stroke="#e8d8b8" stroke-width="5" fill="none" stroke-dasharray="26,20" stroke-linecap="round" opacity=".7"/>

  <!-- Side road: curves down-left to center -->
  <path d="M 60 900 Q 220 860 380 840 Q 520 820 660 800 Q 800 780 920 760 Q 1060 740 1200 700 Q 1360 660 1520 600 Q 1700 540 1900 500 Q 2040 470 2180 440" stroke="#c8b898" stroke-width="24" fill="none" stroke-linecap="round" opacity=".8"/>
  <path d="M 60 900 Q 220 860 380 840 Q 520 820 660 800 Q 800 780 920 760 Q 1060 740 1200 700 Q 1360 660 1520 600 Q 1700 540 1900 500 Q 2040 470 2180 440" stroke="#e8d8b8" stroke-width="4" fill="none" stroke-dasharray="22,18" stroke-linecap="round" opacity=".6"/>

  <!-- Short connector road (residential) -->
  <path d="M 700 720 Q 740 920 760 1100 Q 780 1280 800 1450" stroke="#c8b898" stroke-width="20" fill="none" stroke-linecap="round" opacity=".75"/>
  <path d="M 700 720 Q 740 920 760 1100 Q 780 1280 800 1450" stroke="#e8d8b8" stroke-width="4" fill="none" stroke-dasharray="20,16" stroke-linecap="round" opacity=".55"/>

  <!-- Another connector from center to right -->
  <path d="M 1200 700 Q 1300 900 1380 1100 Q 1440 1260 1500 1450" stroke="#c8b898" stroke-width="20" fill="none" stroke-linecap="round" opacity=".75"/>

</svg>

<!-- TREE EMOJIS scattered naturally -->
<div class="deco" style="left:60px;top:160px;font-size:28px;animation:wander 0s">🌲</div>
<div class="deco" style="left:120px;top:100px;font-size:24px">🌲</div>
<div class="deco" style="left:180px;top:200px;font-size:26px">🌳</div>

// ── ZOOM / PAN ──
var scale=0.3,panX=0,panY=0,W=2200,H=1600;
var minScale=0.08;
function applyT(hud){
  document.getElementById('world').style.transform='translate('+panX+'px,'+panY+'px) scale('+scale+')';
  if(hud!==false){
    var h=document.getElementById('zoom-hud');
    h.textContent=Math.round(scale*100)+'%';
    h.classList.add('show');
    clearTimeout(window._zh);window._zh=setTimeout(function(){h.classList.remove('show');},1200);
  }
}
function clampPan(){
  var cv=document.getElementById('canvas').getBoundingClientRect();
  panX=Math.min(40,Math.max(cv.width-W*scale-4,panX));
  panY=Math.min(40,Math.max(cv.height-H*scale-4,panY));
}
function zoom(d,cx,cy){
  var prev=scale;
  scale=Math.min(3,Math.max(0.08,scale+d));
  var cv=document.getElementById('canvas').getBoundingClientRect();
  if(cx===undefined){cx=cv.width/2;cy=cv.height/2;}
  panX=cx-(cx-panX)*(scale/prev);
  panY=cy-(cy-panY)*(scale/prev);
  clampPan();applyT();
}
function zoomFit(){
  var cv=document.getElementById('canvas').getBoundingClientRect();
  scale=Math.min((cv.width-4)/W,(cv.height-4)/H);
  panX=(cv.width-W*scale)/2;
  panY=(cv.height-H*scale)/2;
  applyT(false);
}
// Scroll zoom
document.getElementById('canvas').addEventListener('wheel',function(e){e.preventDefault();zoom(e.deltaY<0?0.08:-0.08,e.clientX,e.clientY);},{passive:false});
// Pinch
var pinch0=null,pScale0=1,pMx=0,pMy=0;
document.getElementById('canvas').addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    e.preventDefault();
    isPanning=false;panStart=null;liftedBld=null;
    clearTimeout(lpTimer);lpTimer=null;
    var a=e.touches[0],b=e.touches[1];
    var dx=a.clientX-b.clientX,dy=a.clientY-b.clientY;
    pinch0=Math.sqrt(dx*dx+dy*dy);pScale0=scale;
    pMx=(a.clientX+b.clientX)/2;pMy=(a.clientY+b.clientY)/2;
  }
},{passive:false});
document.getElementById('canvas').addEventListener('touchmove',function(e){
  if(e.touches.length===2&&pinch0){
    e.preventDefault();
    var a=e.touches[0],b=e.touches[1];
    var dx=a.clientX-b.clientX,dy=a.clientY-b.clientY;
    var d=Math.sqrt(dx*dx+dy*dy);
    var prev=scale;
    scale=Math.min(3,Math.max(0.08,pScale0*(d/pinch0)));
    panX=pMx-(pMx-panX)*(scale/prev);
    panY=pMy-(pMy-panY)*(scale/prev);
    clampPan();applyT();
  }
},{passive:false});
document.getElementById('canvas').addEventListener('touchend',function(e){if(e.touches.length<2)pinch0=null;},{passive:true});

// ── PAN ──
var isPanning=false,panStart=null;
document.getElementById('canvas').addEventListener('pointerdown',function(e){
  var t=e.target,w=document.getElementById('world');
  var onBg=t===e.currentTarget||t===w||t.tagName==='svg'||t.tagName==='polygon'||t.tagName==='path'||t.tagName==='rect'||t.tagName==='ellipse'||t.tagName==='line'||t.tagName==='text'||t.classList.contains('npc')||t.classList.contains('deco');
  if(onBg&&!liftedBld){isPanning=true;panStart={x:e.clientX-panX,y:e.clientY-panY};}
});
document.addEventListener('pointermove',function(e){
  if(isPanning&&panStart&&Math.abs(e.clientX-panStart.x+panX)>2){
    panX=e.clientX-panStart.x;panY=e.clientY-panStart.y;
    clampPan();applyT(false);
  }
  if(liftedBld) moveLift(e);
  if(signDrag) moveSignDrag(e);
  if(decoDrag) moveDecoDrag(e);
});

  clearTimeout(lpTimer);lpTimer=null;
  isPanning=false;panStart=null;

// ── BUILDING INTERACTION ──
var liftedBld=null,lpTimer=null,lastTap={},dropTarget=null;
var LP=550,DT=360,MV=8;

function worldPt(cx,cy){
  var wr=document.getElementById('world').getBoundingClientRect();
  return{x:(cx-wr.left)/scale,y:(cy-wr.top)/scale};
}
function onBldDown(e,id){
  if(e.target.classList.contains('bld-del')) return;
  e.stopPropagation();e.preventDefault();
  isPanning=false;panStart=null;
  var el=document.getElementById('bld-'+id);
  var wp=worldPt(e.clientX,e.clientY);
  var bx=parseFloat(el.style.left)||0,by=parseFloat(el.style.top)||0;
  // Double-tap
  var now=Date.now();
  if(lastTap[id]&&(now-lastTap[id])<DT){lastTap[id]=0;openBld(id);return;}
  lastTap[id]=now;
  // Edit mode: immediate lift
  if(editMode){
    liftedBld={id:id,el:el,offX:wp.x-bx,offY:wp.y-by};
    el.classList.add('lifted');el.classList.remove('wiggling');
    return;
  }
  // Normal: long press
  var sx=e.clientX,sy=e.clientY;
  var offX=wp.x-bx,offY=wp.y-by;
  lpTimer=setTimeout(function(){
    lpTimer=null;
    liftedBld={id:id,el:el,offX:offX,offY:offY};
    el.classList.add('lifted');
    if(navigator.vibrate)navigator.vibrate(35);
  },LP);
  // Cancel on move
  var onMove=function(ev){if(Math.abs(ev.clientX-sx)>MV||Math.abs(ev.clientY-sy)>MV){clearTimeout(lpTimer);lpTimer=null;document.removeEventListener('pointermove',onMove);}};
  document.addEventListener('pointermove',onMove);
}
function moveLift(e){
  var lb=liftedBld;
  var wp=worldPt(e.clientX,e.clientY);
  lb.el.style.left=(wp.x-lb.offX)+'px';
  lb.el.style.top=(wp.y-lb.offY)+'px';
  dropTarget=null;
  blds.forEach(function(b){
    if(b.id===lb.id)return;
    var te=document.getElementById('bld-'+b.id);if(!te)return;
    var tr=te.getBoundingClientRect();
    te.style.outline='';
    if(e.clientX>=tr.left&&e.clientX<=tr.right&&e.clientY>=tr.top&&e.clientY<=tr.bottom){dropTarget=b.id;te.style.outline='3px dashed #f59e0b';}
  });
}
function dropLift(e){
  var lb=liftedBld;liftedBld=null;
  lb.el.classList.remove('lifted');
  if(editMode)lb.el.classList.add('wiggling');
  blds.forEach(function(b){var te=document.getElementById('bld-'+b.id);if(te)te.style.outline='';});
  if(dropTarget){
    var drg=getBld(lb.id),tgt=getBld(dropTarget);
    showConfirm('Add as room?','"'+drg.name+'" → room inside "'+tgt.name+'".',function(){
      if(!tgt.rooms)tgt.rooms=[];
      tgt.rooms.push({id:drg.id,icon:drg.icon,name:drg.name,desc:drg.desc||'',url:drg.url});
      blds=blds.filter(function(b){return b.id!==drg.id;});
      save();render();
    });
    var b=getBld(lb.id);if(b){lb.el.style.left=b.x+'px';lb.el.style.top=b.y+'px';}
  }else{
    var wp=worldPt(e.clientX,e.clientY);
    var b=getBld(lb.id);
    if(b){b.x=Math.round(wp.x-lb.offX);b.y=Math.round(wp.y-lb.offY);}
    save();
  }
  dropTarget=null;
}
window.delBld=function(e,id){e.stopPropagation();if(!confirm('Remove?'))return;blds=blds.filter(function(b){return b.id!==id;});save();var el=document.getElementById('bld-'+id);if(el)el.remove();};

  document.getElementById('modal-body').innerHTML=html;

    +'<button class="ce-btn" style="flex:1" onclick="enterEdit();closeModal()"><span class="ce-icon">✏️</span><div><div class="ce-name">Edit Mode</div></div></button>'
    +'<button class="ce-btn" style="flex:1" onclick="zoomFit();closeModal()"><span class="ce-icon">⊡</span><div><div class="ce-name">Fit Town</div></div></button>'
    +'<button class="ce-btn" style="flex:1;border-color:#fca5a5" onclick="resetTown()"><span class="ce-icon">↺</span><div><div class="ce-name" style="color:#dc2626">Reset</div></div></button>'
    +'<button class="ce-btn" style="flex:1" onclick="addSign();closeModal()"><span class="ce-icon">🪧</span><div><div class="ce-name">Add Sign</div></div></button>'
    +'</div>'
    +'<div class="m-label">🌳 Trees & Plants</div>'+mg(TREES,'tree')
    +'<div class="m-label" style="margin-top:8px">🐄 Animals</div>'+mg(ANIMALS,'animal')
    +'<div class="m-label" style="margin-top:8px">🌾 Farm</div>'+mg(FARM,'farm')
    +'<div class="m-label" style="margin-top:8px">🏠 Structures</div>'+mg(STRUCTS,'struct');
  document.getElementById('bld-modal').classList.add('open');
  window._CE={trees:TREES,animals:ANIMALS,farms:FARM,structs:STRUCTS};
}
window.ceAdd=function(type,i){
  var pool={tree:TREES,animal:ANIMALS,farm:FARM,struct:STRUCTS};
  var it=pool[type]&&pool[type][i];if(!it)return;
  if(type==='struct'){
    var n=prompt('Building name:',it.n);if(!n)return;
    var u=prompt('Link URL (or blank):','');
    var b={id:'b'+Date.now(),icon:it.i,name:n,url:u||'',bc:it.bc||'#6b7280',x:600,y:600,w:120,rooms:[]};
    blds.push(b);save();renderBld(b);
  }else{
    var d={id:'d'+Date.now(),icon:it.i,x:600,y:600};
    decos.push(d);save();renderDeco(d);
  }
  closeModal();enterEdit();
};

// ── INIT ──
loadState();
render();
setTimeout(function(){
  var cv=document.getElementById('canvas').getBoundingClientRect();
  scale=Math.min((cv.width-4)/W,(cv.height-4)/H);
  panX=(cv.width-W*scale)/2;
  panY=(cv.height-H*scale)/2;
  applyT(false);
},60);
</script>
</body>
