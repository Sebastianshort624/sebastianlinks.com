<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Sebastian's Town</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#d4ecc0;overflow:hidden;height:100vh;width:100vw;touch-action:none;user-select:none;-webkit-user-select:none}

/* ── NAV ── */
.nav{background:rgba(255,255,255,.88);backdrop-filter:blur(8px);padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #b8dca0;z-index:1000;position:relative}
.nav-logo{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:#2d5a27;display:flex;align-items:center;gap:6px}
.nav-tools{display:flex;gap:6px}
.nav-btn{background:#fff;border:2px solid #b8dca0;color:#2d5a27;border-radius:16px;padding:4px 12px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap}
.nav-btn:hover{background:#2d5a27;color:#fff}
.nav-btn.red{border-color:#fca5a5;color:#dc2626}
.nav-btn.red:hover{background:#dc2626;color:#fff}

/* ── TOWN CANVAS ── */
.canvas{position:absolute;top:48px;left:0;right:0;bottom:0;overflow:hidden;background:#d4ecc0;cursor:grab}
.canvas.grabbing{cursor:grabbing}
.world{position:absolute;width:1800px;height:1400px;background:#c8e6b0}

/* ── GROUND TEXTURE ── */
.world::before{content:'';position:absolute;inset:0;background:
  radial-gradient(circle at 20% 30%,rgba(255,255,255,.08) 0%,transparent 50%),
  radial-gradient(circle at 80% 70%,rgba(255,255,255,.06) 0%,transparent 50%);
  pointer-events:none}

/* ── ROADS ── */
.road{position:absolute;background:#bdbdbd}
.road.h{height:36px}
.road.v{width:36px}
.road.h::after{content:'';position:absolute;top:50%;left:0;right:0;height:3px;transform:translateY(-50%);background:repeating-linear-gradient(90deg,#fff 0,#fff 24px,transparent 24px,transparent 48px)}
.road.v::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:3px;transform:translateX(-50%);background:repeating-linear-gradient(180deg,#fff 0,#fff 24px,transparent 24px,transparent 48px)}
.road.cross{background:#b0b0b0}

/* ── STREET SIGNS ── */
.sign-wrap{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:move;z-index:30}
.sign-wrap.dragging{opacity:.8;z-index:500}
.sign-post{width:4px;height:20px;background:linear-gradient(#888,#666);border-radius:0 0 2px 2px}
.sign-board{background:#1a6b1a;color:#fff;font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;padding:3px 10px;border-radius:3px;border:2px solid #0f4a0f;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;box-shadow:2px 2px 0 rgba(0,0,0,.3);cursor:pointer}
.sign-board:hover{background:#0f4a0f}

/* ── TREES & DECORATIONS ── */
.deco{position:absolute;pointer-events:none;font-size:20px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.2));animation:sway 3s ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.car{position:absolute;pointer-events:none;font-size:14px}

/* ── BUILDINGS ── */
.bld{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:12px;border:3px solid;box-shadow:4px 6px 0 rgba(0,0,0,.13);cursor:pointer;touch-action:none;transition:box-shadow .15s;padding:8px 6px 8px;text-align:center;min-width:100px;min-height:100px;z-index:10}
.bld:hover{box-shadow:6px 8px 0 rgba(0,0,0,.18)}
.bld.dragging{opacity:.85;z-index:900;box-shadow:8px 14px 20px rgba(0,0,0,.3);transform:scale(1.06);cursor:grabbing}
.bld.drop-target{outline:3px dashed #f59e0b;outline-offset:3px;animation:pulse-border .6s infinite}
@keyframes pulse-border{0%,100%{outline-color:#f59e0b}50%{outline-color:#ef4444}}

/* ROOF */
.bld-roof{width:calc(100% + 6px);height:22px;clip-path:polygon(0 100%,50% 0,100% 100%);margin-bottom:-4px;position:relative;left:-3px;border-radius:3px 3px 0 0;flex-shrink:0}
.bld-icon{font-size:26px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.15));flex-shrink:0}
.bld-name{font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;line-height:1.2;flex-shrink:0}
.bld-sub{font-size:9px;font-weight:700;opacity:.65;line-height:1.2;flex-shrink:0}
.bld-rooms-badge{background:rgba(0,0,0,.15);border-radius:100px;padding:1px 6px;font-size:9px;font-weight:800;flex-shrink:0}

/* ── PARK ── */
.park{position:absolute;background:#a8d890;border-radius:16px;border:2px solid #7ac060;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;pointer-events:none}
.park-icon{font-size:26px}
.park-name{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;color:#2d5a27;text-transform:uppercase;letter-spacing:.5px}

/* ── MODALS ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px;width:480px;max-width:96vw;max-height:86vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-hdr{padding:16px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f3f4f6}
.modal-hdr-icon{font-size:28px}
.modal-hdr-name{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;color:#1a1a2e;flex:1}
.modal-close{background:#f3f4f6;border:none;border-radius:50%;width:30px;height:30px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{overflow-y:auto;padding:16px 18px 20px;flex:1}
.room-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.room-btn{display:flex;align-items:center;gap:12px;background:#f8faf5;border:2px solid #d4ecc0;border-radius:12px;padding:12px 14px;cursor:pointer;transition:.15s;text-decoration:none}
.room-btn:hover{border-color:#2d6a2d;background:#f0f9e8}
.room-icon{font-size:22px;flex-shrink:0}
.room-name{font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:#1a1a2e;flex:1}
.room-desc{font-size:11px;color:#6b7280}
.room-eject{background:none;border:1px solid #fca5a5;color:#dc2626;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;flex-shrink:0}
.modal-divider{height:1px;background:#f3f4f6;margin:12px 0}
.modal-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;margin-bottom:8px}
.note-ta{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:9px;font-family:'Inter',sans-serif;font-size:13px;resize:none;min-height:60px;outline:none;color:#1a1a2e}
.note-ta:focus{border-color:#2d6a2d}
.note-add{background:#2d6a2d;color:#fff;border:none;border-radius:7px;padding:7px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;margin-top:6px}
.note-entry{background:#f8faf5;border:1px solid #e5e7eb;border-radius:7px;padding:8px 10px;margin-bottom:5px;display:flex;gap:8px;align-items:flex-start;font-size:12px;color:#374151}
.note-del{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:11px;flex-shrink:0}

/* ADD BUILDING PANEL */
.add-panel{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#fff;border-radius:16px;border:2px solid #d4ecc0;padding:12px 16px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:1500;width:340px;max-width:94vw}
.add-panel.open{display:block}
.ap-title{font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;color:#1d4a1d;margin-bottom:10px}
.ap-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
.ap-item{background:#f8faf5;border:1.5px solid #d4ecc0;border-radius:8px;padding:8px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:.15s;font-size:10px;font-weight:700;color:#1d4a1d;text-align:center}
.ap-item:hover{border-color:#2d6a2d;background:#f0f9e8}
.ap-item .icon{font-size:20px}
.ap-close{background:#f3f4f6;border:none;border-radius:7px;padding:6px;width:100%;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;color:#374151}

/* CONFIRM MODAL */
.confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;align-items:center;justify-content:center;padding:20px}
.confirm-modal.open{display:flex}
.confirm-box{background:#fff;border-radius:16px;padding:24px;max-width:320px;width:100%;text-align:center;box-shadow:0 16px 40px rgba(0,0,0,.2)}
.confirm-title{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:#1a1a2e;margin-bottom:8px}
.confirm-msg{font-size:13px;color:#6b7280;margin-bottom:18px;line-height:1.5}
.confirm-btns{display:flex;gap:10px}
.cbtn{flex:1;border:none;border-radius:9px;padding:11px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer}
.cbtn.yes{background:#2d6a2d;color:#fff}
.cbtn.no{background:#f3f4f6;color:#374151}
</style>
</head>

<script>
// ══════════════════════════════════
// DATA
// ══════════════════════════════════
var SK = 'seb_town_v2';
var SIGN_KEY = 'seb_town_signs';

var DEFAULT_BUILDINGS = [
  {id:'alpha-office',icon:'⚡',name:'Alpha Office',desc:'CRM · Clients · Presentations',url:'https://alphafiles.net/vitals/',bg:'#dbeafe',border:'#3b82f6',color:'#1e3a8a',roof:'#2563eb',x:40,y:80,rooms:[]},

  ]},
  {id:'estate-planning',icon:'🏠',name:'Estate Planning',desc:'Insurance · Life',url:'',bg:'#fef3c7',border:'#fcd34d',color:'#78350f',roof:'#d97706',x:1000,y:60,rooms:[
    {id:'insurance',icon:'🛡️',name:'Insurance Table',desc:'7-company comparison',url:'/insurance/'},
    {id:'joshuason',icon:'🪖',name:'Military Finance',desc:"Joshua's budget",url:'/joshuason/'}
  ]},
  {id:'home-sale',icon:'🏡',name:'118 Silverlimb',desc:'For Sale',url:'/home/',bg:'#dcfce7',border:'#4ade80',color:'#14532d',roof:'#16a34a',x:1180,y:60,rooms:[]},
  {id:'fire-escape',icon:'🔥',name:'Fire Escape',desc:'Escape plan',url:'/fireescape/',bg:'#fee2e2',border:'#f87171',color:'#7f1d1d',roof:'#dc2626',x:1000,y:200,rooms:[]},
  {id:'joshua',icon:'🪖',name:"Joshua's Barracks",desc:'Army · Finance',url:'/joshuason/',bg:'#dcfce7',border:'#86efac',color:'#14532d',roof:'#15803d',x:1000,y:680,rooms:[]},

];

var DEFAULT_SIGNS = [
  {id:'sign-1',name:'THE OFFICE',x:150,y:30},
  {id:'sign-2',name:'WALL STREET',x:1060,y:30},
  {id:'sign-3',name:'FAMILY SQUARE',x:1060,y:640},
  {id:'sign-4',name:'RECOVERY VILLAGE',x:80,y:640},
  {id:'sign-5',name:'TOWN PLAZA',x:480,y:360}
];

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
var buildings, signs;
function load(){
  try{buildings=JSON.parse(localStorage.getItem(SK));} catch(e){buildings=null;}
  if(!buildings||!buildings.length) buildings=JSON.parse(JSON.stringify(DEFAULT_BUILDINGS));
  try{signs=JSON.parse(localStorage.getItem(SIGN_KEY));} catch(e){signs=null;}
  if(!signs||!signs.length) signs=JSON.parse(JSON.stringify(DEFAULT_SIGNS));
}
function save(){
  localStorage.setItem(SK,JSON.stringify(buildings));
  localStorage.setItem(SIGN_KEY,JSON.stringify(signs));
}
function resetTown(){
  if(!confirm('Reset town to default? This cannot be undone.')) return;
  localStorage.removeItem(SK);localStorage.removeItem(SIGN_KEY);location.reload();
}

// ══════════════════════════════════
// RENDER
// ══════════════════════════════════
var world;
function render(){
  world=document.getElementById('world');
  // Remove old buildings and signs
  world.querySelectorAll('.bld,.sign-wrap').forEach(function(el){el.remove();});
  buildings.forEach(renderBuilding);
  signs.forEach(renderSign);
}

function renderBuilding(b){
  var el=document.createElement('div');
  el.className='bld';
  el.id='bld-'+b.id;
  el.style.cssText='left:'+b.x+'px;top:'+b.y+'px;background:'+b.bg+';border-color:'+b.border+';color:'+b.color+';width:120px;min-height:110px';

  var roomCount=b.rooms?b.rooms.length:0;
  var roomsBadge=roomCount>0?'<div class="bld-rooms-badge">'+roomCount+' room'+(roomCount>1?'s':'')+'</div>':'';

  el.innerHTML='<div class="bld-roof" style="background:'+b.roof+'"></div>'
    +'<div class="bld-icon">'+b.icon+'</div>'
    +'<div class="bld-name">'+b.name+'</div>'
    +(b.desc?'<div class="bld-sub">'+b.desc+'</div>':'')
    +roomsBadge;

  // Events
  el.addEventListener('pointerdown',function(e){onBldPointerDown(e,b.id);});
  world.appendChild(el);

function renderSign(s){
  var el=document.createElement('div');
  el.className='sign-wrap';
  el.id='sign-'+s.id;
  el.style.cssText='left:'+s.x+'px;top:'+s.y+'px';
  el.innerHTML='<div class="sign-board" id="sb-'+s.id+'">'+s.name+'</div><div class="sign-post"></div>';
  el.querySelector('.sign-board').addEventListener('dblclick',function(e){e.stopPropagation();editSign(s.id);});
  el.addEventListener('pointerdown',function(e){onSignPointerDown(e,s.id);});
  world.appendChild(el);
}

// ══════════════════════════════════
// CANVAS PAN
// ══════════════════════════════════
var panX=0,panY=0,panStart=null,isPanning=false;
var canvas=document.getElementById('canvas');
canvas.addEventListener('pointerdown',function(e){
  if(e.target===canvas||e.target===world||e.target.classList.contains('road')||e.target.classList.contains('deco')||e.target.classList.contains('car')||e.target.classList.contains('world')){
    isPanning=true;
    panStart={x:e.clientX-panX,y:e.clientY-panY};
    canvas.classList.add('grabbing');
  }
});
document.addEventListener('pointermove',function(e){
  if(isPanning&&panStart){
    panX=e.clientX-panStart.x;
    panY=e.clientY-panStart.y;
    document.getElementById('world').style.transform='translate('+panX+'px,'+panY+'px)';
  }
  if(dragState) moveDrag(e);
  if(signDrag) moveSignDrag(e);
});
document.addEventListener('pointerup',function(e){
  if(isPanning){isPanning=false;canvas.classList.remove('grabbing');panStart=null;}
  if(dragState) endDrag(e);
  if(signDrag) endSignDrag(e);
});

// ══════════════════════════════════
// BUILDING DRAG
// ══════════════════════════════════
var dragState=null;
var dropTimer=null;
var pendingDrop=null;

function onBldPointerDown(e,id){
  e.stopPropagation();
  e.preventDefault();
  var el=document.getElementById('bld-'+id);
  var rect=el.getBoundingClientRect();
  dragState={
    id:id,
    el:el,
    startX:e.clientX,
    startY:e.clientY,
    moved:false,
    offX:e.clientX-rect.left,
    offY:e.clientY-rect.top
  };
}

function getBldData(id){
  return buildings.find(function(b){return b.id===id;});
}
function worldCoord(clientX,clientY){
  var wr=document.getElementById('world').getBoundingClientRect();
  return{x:clientX-wr.left,y:clientY-wr.top};
}

function moveDrag(e){
  var ds=dragState;
  if(Math.abs(e.clientX-ds.startX)<4&&Math.abs(e.clientY-ds.startY)<4&&!ds.moved) return;
  if(!ds.moved){ds.moved=true;ds.el.classList.add('dragging');}
  var wc=worldCoord(e.clientX-ds.offX,e.clientY-ds.offY);
  ds.el.style.left=wc.x+'px';
  ds.el.style.top=wc.y+'px';
  // Check hover over another building
  checkDropTarget(e,ds.id);
}

function checkDropTarget(e,dragId){
  var hit=null;
  buildings.forEach(function(b){
    if(b.id===dragId) return;
    var el=document.getElementById('bld-'+b.id);
    if(!el) return;
    var r=el.getBoundingClientRect();
    if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
      hit=b.id;
    }
    el.classList.remove('drop-target');
  });
  if(hit){
    document.getElementById('bld-'+hit).classList.add('drop-target');
    if(!dropTimer||pendingDrop!==hit){
      pendingDrop=hit;
      clearTimeout(dropTimer);
      dropTimer=setTimeout(function(){},500);
    }
  } else {
    pendingDrop=null;clearTimeout(dropTimer);dropTimer=null;
  }
}

function endDrag(e){
  var ds=dragState;
  dragState=null;
  buildings.forEach(function(b){
    var el=document.getElementById('bld-'+b.id);
    if(el) el.classList.remove('drop-target');
  });

  if(!ds.moved){
    // It was a tap/click
    openBuilding(ds.id);
    return;
  }

  // Check if dropped on another building
  var targetId=null;
  buildings.forEach(function(b){
    if(b.id===ds.id) return;
    var el=document.getElementById('bld-'+b.id);
    if(!el) return;
    var r=el.getBoundingClientRect();
    if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
      targetId=b.id;
    }
  });

  if(targetId){
    var dragged=getBldData(ds.id);
    var target=getBldData(targetId);
    showConfirm(
      'Add as a room?',
      '"'+dragged.name+'" will become a room inside "'+target.name+'".',
      function(){
        // Add dragged as room in target
        if(!target.rooms) target.rooms=[];
        target.rooms.push({id:dragged.id,icon:dragged.icon,name:dragged.name,desc:dragged.desc,url:dragged.url,bg:dragged.bg,border:dragged.border,color:dragged.color,roof:dragged.roof});
        // Remove dragged from top level
        buildings=buildings.filter(function(b){return b.id!==dragged.id;});
        save();render();
      }
    );
    // Snap back while waiting
    var b=getBldData(ds.id);
    ds.el.style.left=b.x+'px';
    ds.el.style.top=b.y+'px';
  } else {
    // Save new position
    var wc=worldCoord(e.clientX-ds.offX,e.clientY-ds.offY);
    var b=getBldData(ds.id);
    if(b){b.x=Math.round(wc.x);b.y=Math.round(wc.y);}
    save();
  }
  ds.el.classList.remove('dragging');
}

// ══════════════════════════════════
// SIGN DRAG
// ══════════════════════════════════
var signDrag=null;
function onSignPointerDown(e,id){
  e.stopPropagation();e.preventDefault();
  var el=document.getElementById('sign-'+id);
  var r=el.getBoundingClientRect();
  signDrag={id:id,el:el,offX:e.clientX-r.left,offY:e.clientY-r.top,moved:false,sx:e.clientX,sy:e.clientY};
}
function moveSignDrag(e){
  if(Math.abs(e.clientX-signDrag.sx)<4&&Math.abs(e.clientY-signDrag.sy)<4&&!signDrag.moved) return;
  signDrag.moved=true;
  signDrag.el.classList.add('dragging');
  var wc=worldCoord(e.clientX-signDrag.offX,e.clientY-signDrag.offY);
  signDrag.el.style.left=wc.x+'px';
  signDrag.el.style.top=wc.y+'px';
}
function endSignDrag(e){
  var sd=signDrag;signDrag=null;
  if(!sd.moved) return;
  var s=signs.find(function(s){return s.id===sd.id;});
  var wc=worldCoord(e.clientX-sd.offX,e.clientY-sd.offY);
  if(s){s.x=Math.round(wc.x);s.y=Math.round(wc.y);}
  sd.el.classList.remove('dragging');
  save();
}
function editSign(id){
  var s=signs.find(function(s){return s.id===id;});
  if(!s) return;
  var name=prompt('Street name:',s.name);
  if(name===null) return;
  s.name=name.toUpperCase();
  save();render();
}
function addSign(){
  var wc=worldCoord(panX?200:200,panY?200:200);
  var name=prompt('New street name:','MY STREET');
  if(!name) return;
  signs.push({id:'sign-'+Date.now(),name:name.toUpperCase(),x:400,y:300});
  save();render();
}

// ══════════════════════════════════
// OPEN BUILDING
// ══════════════════════════════════
var modalBldId=null;
function openBuilding(id){
  var b=getBldData(id);
  if(!b) return;
  var rooms=b.rooms&&b.rooms.length?b.rooms:[];
  // Single room — go directly
  if(rooms.length===1&&rooms[0].url){window.open(rooms[0].url,'_self');return;}
  // No rooms + has URL — go directly
  if(rooms.length===0&&b.url){window.open(b.url,'_self');return;}
  // Multiple rooms or special — show modal
  modalBldId=id;
  document.getElementById('modal-icon').textContent=b.icon;
  document.getElementById('modal-name').textContent=b.name;
  document.getElementById('modal-hdr').style.background=b.bg||'#f8fafc';
  buildModalBody(b);
  document.getElementById('bld-modal').classList.add('open');
}

function buildModalBody(b){
  var rooms=b.rooms&&b.rooms.length?b.rooms:[];
  var notes=loadNotes(b.id);
  var roomsHtml='';
  if(b.url&&rooms.length===0){
    roomsHtml='<a href="'+b.url+'" class="room-btn"><span class="room-icon">'+b.icon+'</span><div><div class="room-name">Open '+b.name+'</div></div></a>';
  } else if(rooms.length){
    roomsHtml='<div class="room-list">'+rooms.map(function(r){
      return '<div class="room-btn" style="justify-content:space-between">'
        +'<a href="'+(r.url||'#')+'" style="display:flex;align-items:center;gap:12px;flex:1;text-decoration:none">'
        +'<span class="room-icon">'+r.icon+'</span>'
        +'<div><div class="room-name">'+r.name+'</div><div class="room-desc">'+(r.desc||'')+'</div></div>'
        +'</a>'
        +'<button class="room-eject" onclick="ejectRoom(\''+b.id+'\',\''+r.id+'\')">↩ Eject</button>'
        +'</div>';
    }).join('')+'</div>';
  }
  var notesHtml='<div class="modal-divider"></div>'
    +'<div class="modal-label">Notes</div>'
    +'<textarea class="note-ta" id="modal-note-ta" placeholder="Add a note..."></textarea>'
    +'<button class="note-add" onclick="addBldNote(\''+b.id+'\')">+ Add</button>'
    +(notes.length?'<div style="margin-top:10px">'+notes.map(function(n,i){
      return '<div class="note-entry"><span style="flex:1">'+n+'</span><button class="note-del" onclick="delBldNote(\''+b.id+'\','+i+')">✕</button></div>';
    }).join('')+'</div>':'');
  document.getElementById('modal-body').innerHTML=roomsHtml+notesHtml;
}

function ejectRoom(parentId,roomId){
  var parent=getBldData(parentId);
  var room=parent.rooms.find(function(r){return r.id===roomId;});
  if(!room) return;
  // Add back to top level
  var newBld=JSON.parse(JSON.stringify(room));
  newBld.x=parent.x+160;newBld.y=parent.y;newBld.rooms=[];
  if(!newBld.bg) newBld.bg='#f3f4f6';
  if(!newBld.border) newBld.border='#9ca3af';
  if(!newBld.color) newBld.color='#374151';
  if(!newBld.roof) newBld.roof='#6b7280';
  buildings.push(newBld);
  parent.rooms=parent.rooms.filter(function(r){return r.id!==roomId;});
  save();render();
  closeModal();
}

function closeModal(){document.getElementById('bld-modal').classList.remove('open');}

// ══════════════════════════════════
// NOTES
// ══════════════════════════════════
function loadNotes(id){try{return JSON.parse(localStorage.getItem('tn_'+id)||'[]');}catch(e){return[];}}
function saveNotes(id,n){localStorage.setItem('tn_'+id,JSON.stringify(n));}
window.addBldNote=function(id){
  var ta=document.getElementById('modal-note-ta');
  var val=ta.value.trim();if(!val) return;
  var n=loadNotes(id);n.unshift(val);saveNotes(id,n);
  ta.value='';
  var b=getBldData(id);if(b) buildModalBody(b);
};
window.delBldNote=function(id,i){
  var n=loadNotes(id);n.splice(i,1);saveNotes(id,n);
  var b=getBldData(id);if(b) buildModalBody(b);
};

// ══════════════════════════════════
// CONFIRM
// ══════════════════════════════════
var confirmCb=null;
function showConfirm(title,msg,cb){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  confirmCb=cb;
  document.getElementById('confirm-yes').onclick=function(){confirmCb&&confirmCb();cancelConfirm();};
  document.getElementById('confirm-modal').classList.add('open');
}
function cancelConfirm(){document.getElementById('confirm-modal').classList.remove('open');confirmCb=null;}

  {icon:'📋',name:'Project',desc:'',url:'',bg:'#f3f4f6',border:'#9ca3af',color:'#374151',roof:'#6b7280'},

  {icon:'📚',name:'Resource',desc:'',url:'',bg:'#fde68a',border:'#fbbf24',color:'#78350f',roof:'#d97706'},

function toggleAddPanel(){
  var panel=document.getElementById('add-panel');
  panel.classList.toggle('open');
  if(panel.classList.contains('open')){
    document.getElementById('ap-grid').innerHTML=PRESETS.map(function(p,i){
      return '<div class="ap-item" onclick="addBuilding('+i+')" ><div class="icon">'+p.icon+'</div><div>'+p.name+'</div></div>';
    }).join('');
  }
}
function addBuilding(presetIdx){
  var p=PRESETS[presetIdx];
  var name=prompt('Building name:',p.name);
  if(!name) return;
  var url=prompt('Link URL (or leave blank):','');
  var newBld=JSON.parse(JSON.stringify(p));
  newBld.id='bld-'+Date.now();
  newBld.name=name;
  newBld.url=url||'';
  newBld.rooms=[];
  newBld.x=460;newBld.y=520;
  buildings.push(newBld);
  save();render();
  toggleAddPanel();
}
