<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Sebastian's Town — Greenville</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#c8e6b0;overflow:hidden;height:100vh;width:100vw;touch-action:none;user-select:none;-webkit-user-select:none}

/* ── NAV ── */
.nav{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);padding:0 12px;height:46px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #b8dca0;z-index:1000;position:relative;gap:6px}
.nav-logo{font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;color:#2d5a27;white-space:nowrap}
.nav-tools{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto}
.nb{background:#fff;border:2px solid #b8dca0;color:#2d5a27;border-radius:14px;padding:3px 10px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;flex-shrink:0}
.nb:hover,.nb.active{background:#2d5a27;color:#fff;border-color:#2d5a27}
.nb.red{border-color:#fca5a5;color:#dc2626}.nb.red:hover{background:#dc2626;color:#fff;border-color:#dc2626}
.nb.gold{border-color:#fbbf24;color:#92400e;background:#fef3c7}.nb.gold:hover,.nb.gold.active{background:#d97706;color:#fff;border-color:#d97706}

/* ── CANVAS ── */
.canvas{position:absolute;top:46px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
.canvas.panning{cursor:grabbing}

/* ── WORLD ── */
.world{position:absolute;width:2400px;height:1800px;transform-origin:0 0}
.world-ground{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,#b8de98 0%,#c8e6b0 50%,#b0d890 100%)}

/* ── ROADS ── */
.road{position:absolute;background:#b0b0b0}
.road.h{height:38px}.road.v{width:38px}
.road.h::after{content:'';position:absolute;top:50%;left:0;right:0;height:3px;transform:translateY(-50%);background:repeating-linear-gradient(90deg,#fff 0,#fff 28px,transparent 28px,transparent 56px)}
.road.v::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:3px;transform:translateX(-50%);background:repeating-linear-gradient(180deg,#fff 0,#fff 28px,transparent 28px,transparent 56px)}
.cross{position:absolute;background:#a8a8a8;z-index:1}

/* ── SIDEWALKS ── */
.sidewalk{position:absolute;background:#d6cfc4;opacity:.6}

/* ── PARK ── */
.park{position:absolute;background:radial-gradient(ellipse,#90cc70,#78bb58);border-radius:50%;border:3px solid #60a840;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:.2s;z-index:3}
.park:hover{transform:scale(1.03)}
.park-icon{font-size:28px}
.park-name{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;color:#1a4a10;text-transform:uppercase;letter-spacing:.5px}

/* ── NEIGHBORHOOD ZONES ── */
.nh-zone{position:absolute;border-radius:20px;border:3px dashed;padding:40px 12px 12px}
.nh-zone-label{position:absolute;top:8px;left:50%;transform:translateX(-50%);white-space:nowrap}

/* ── SIGN ── */
.sign-wrap{position:absolute;display:flex;flex-direction:column;align-items:center;z-index:25;cursor:move}
.sign-post{width:4px;height:22px;background:linear-gradient(#999,#666);border-radius:0 0 2px 2px}
.sign-board{background:#1a6b1a;color:#fff;font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;padding:3px 10px;border-radius:3px;border:2px solid #0f4a0f;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;box-shadow:2px 2px 0 rgba(0,0,0,.3);cursor:pointer}
.sign-board.red-sign{background:#b91c1c;border-color:#7f1d1d}
.sign-board.blue-sign{background:#1d4ed8;border-color:#1e3a8a}

/* ── BUILDINGS ── */
.bld{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;border-radius:10px;border:3px solid;padding:6px 6px 8px;text-align:center;z-index:10;transition:box-shadow .15s;overflow:visible;cursor:pointer}
/* 3D effect */
.bld::after{content:'';position:absolute;right:-8px;top:6px;width:8px;height:calc(100% - 4px);border-radius:0 4px 4px 0;background:rgba(0,0,0,.22);clip-path:polygon(0 0,100% 5%,100% 95%,0 100%)}
/* Bottom shadow */
.bld-shadow{position:absolute;bottom:-10px;left:6px;right:-6px;height:10px;border-radius:0 0 6px 6px;background:rgba(0,0,0,.18);clip-path:polygon(0 0,100% 0,100% 100%,4% 100%)}
/* ROOF */
.bld-roof{width:calc(100% + 14px);height:20px;clip-path:polygon(0 100%,50% 0,100% 100%);margin-bottom:-2px;position:relative;left:-7px;flex-shrink:0;filter:brightness(.85)}
.bld-icon{font-size:24px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.2));flex-shrink:0;line-height:1}
.bld-name{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;line-height:1.2;flex-shrink:0}
.bld-sub{font-size:8px;font-weight:700;opacity:.65;line-height:1.1;flex-shrink:0}
.bld-badge{background:rgba(0,0,0,.12);border-radius:100px;padding:1px 6px;font-size:8px;font-weight:800;flex-shrink:0}

/* WIGGLE MODE */
.bld.wiggling{animation:wiggle .25s ease-in-out infinite;cursor:grab}
.bld.wiggling.drag-active{cursor:grabbing;z-index:900;opacity:.88;animation:none}
@keyframes wiggle{0%,100%{transform:rotate(-2.5deg)}50%{transform:rotate(2.5deg)}}
.bld.wiggling .bld-delete{display:flex}
.bld.wiggling .bld-resize{display:block}
/* LIFTED — dragging after long press */
.bld.lifted{
  transform:scale(1.12) rotate(1.5deg)!important;
  box-shadow:0 20px 40px rgba(0,0,0,.35),4px 4px 0 rgba(0,0,0,.2)!important;
  z-index:900!important;
  transition:transform .12s,box-shadow .12s;
  cursor:grabbing!important;
  animation:none!important;
}
.bld-delete{display:none;position:absolute;top:-12px;left:-12px;width:22px;height:22px;background:#ff3b30;border:2px solid #fff;border-radius:50%;color:#fff;font-size:13px;font-weight:900;align-items:center;justify-content:center;z-index:20;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.bld-resize{display:none;position:absolute;bottom:-8px;right:-8px;width:18px;height:18px;background:#007aff;border:2px solid #fff;border-radius:4px;cursor:se-resize;z-index:20}
.bld-resize::after{content:'⤡';font-size:10px;color:#fff;display:flex;align-items:center;justify-content:center;height:100%;font-weight:900}

/* DECORATION ELEMENTS */
.deco-el{position:absolute;font-size:22px;cursor:default;z-index:8;line-height:1;filter:drop-shadow(0 3px 4px rgba(0,0,0,.2))}
.deco-el.movable{cursor:grab;animation:wiggle .25s ease-in-out infinite}
.deco-el.drag-active{cursor:grabbing;animation:none;z-index:900}

/* ANIMATED CHARACTERS (NPC — not draggable) */
.char{position:absolute;font-size:16px;z-index:6;pointer-events:none;line-height:1}
/* Horizontal road chars */
@keyframes carH{0%{left:-80px}100%{left:2480px}}
@keyframes carHr{0%{left:2480px;transform:scaleX(-1)}100%{left:-80px;transform:scaleX(-1)}}
@keyframes carV{0%{top:-80px}100%{top:1880px}}
@keyframes carVr{0%{top:1880px;transform:scaleY(-1)}100%{top:-80px;transform:scaleY(-1)}}
@keyframes walkH{0%{left:-60px}100%{left:2460px}}
@keyframes walkHr{0%{left:2460px;transform:scaleX(-1)}100%{left:-60px;transform:scaleX(-1)}}
@keyframes dogWander{0%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(40px,-20px) rotate(10deg)}50%{transform:translate(80px,10px) rotate(-5deg)}75%{transform:translate(30px,40px) rotate(8deg)}100%{transform:translate(0,0) rotate(0deg)}}

/* BULLETIN */
.bulletin{position:absolute;width:34px;height:32px;background:#92400e;border:2px solid #78350f;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;z-index:20;box-shadow:2px 3px 0 rgba(0,0,0,.2);transition:.15s}
.bulletin:hover{transform:scale(1.18)}
.bulletin::after{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:3px;height:8px;background:#777;border-radius:2px}

/* HEALTH ZONE SPECIAL */
.nh-zone.health{border-color:#ef4444;background:rgba(254,226,226,.25)}

/* ZOOM INDICATOR */
.zoom-hud{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);color:#fff;border-radius:100px;padding:5px 16px;font-size:12px;font-weight:700;z-index:2000;pointer-events:none;opacity:0;transition:opacity .5s;white-space:nowrap}
.zoom-hud.show{opacity:1}

/* WIGGLE BANNER */
.wiggle-banner{display:none;position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:#ff9500;color:#fff;border-radius:100px;padding:8px 22px;font-size:13px;font-weight:800;z-index:2000;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);font-family:'Nunito',sans-serif}
.wiggle-banner.show{display:block}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;align-items:center;justify-content:center;padding:14px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:18px;width:480px;max-width:96vw;max-height:86vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-hdr{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f3f4f6;flex-shrink:0}
.modal-hdr-icon{font-size:26px}
.modal-hdr-name{font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;color:#1a1a2e;flex:1}
.modal-close{background:#f3f4f6;border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{overflow-y:auto;padding:14px 16px 18px;flex:1}
.modal-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;margin-bottom:7px}
.modal-divider{height:1px;background:#f3f4f6;margin:10px 0}
.room-btn{display:flex;align-items:center;gap:10px;background:#f8faf5;border:2px solid #d4ecc0;border-radius:10px;padding:10px 12px;cursor:pointer;transition:.15s;text-decoration:none;margin-bottom:8px}
.room-btn:hover{border-color:#2d6a2d;background:#f0f9e8}
.room-icon{font-size:20px;flex-shrink:0}
.room-name{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:#1a1a2e;flex:1}
.room-desc{font-size:10px;color:#6b7280}
.room-eject{background:none;border:1px solid #fca5a5;color:#dc2626;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;flex-shrink:0}
.note-ta{width:100%;border:1.5px solid #e5e7eb;border-radius:7px;padding:8px;font-family:'Inter',sans-serif;font-size:13px;resize:none;min-height:56px;outline:none;color:#1a1a2e}
.note-ta:focus{border-color:#2d6a2d}
.note-add{background:#2d6a2d;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;margin-top:5px}
.note-entry{background:#f8faf5;border:1px solid #e5e7eb;border-radius:7px;padding:7px 10px;margin-bottom:5px;display:flex;gap:8px;align-items:flex-start;font-size:12px;color:#374151}
.note-del{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:11px;flex-shrink:0}
.task-item{display:flex;align-items:center;gap:7px;padding:8px 0;border-bottom:1px solid #f3f4f6;cursor:pointer}
.task-cb{width:17px;height:17px;border-radius:4px;border:2px solid #d1d5db;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:.15s}
.task-item.done .task-cb{background:#16a34a;border-color:#16a34a;color:#fff}
.task-item.done .task-text{text-decoration:line-through;color:#9ca3af}
.task-text{font-size:12px;font-weight:600;flex:1;color:#374151}
.task-due{font-size:9px;font-weight:700;padding:2px 6px;border-radius:100px;flex-shrink:0}
.task-due.today{background:#fee2e2;color:#dc2626}
.task-due.soon{background:#fef3c7;color:#d97706}
.task-due.ok{background:#dcfce7;color:#16a34a}
.task-add-row{display:flex;gap:5px;margin-top:8px}
.task-input{flex:1;border:1.5px solid #e5e7eb;border-radius:7px;padding:6px 9px;font-family:Inter,sans-serif;font-size:12px;outline:none;color:#1a1a2e}
.task-date{border:1.5px solid #e5e7eb;border-radius:7px;padding:6px 5px;font-size:11px;font-family:Inter,sans-serif;outline:none;color:#374151;width:120px}
.task-add-btn{background:#2d6a2d;color:#fff;border:none;border-radius:7px;padding:6px 10px;font-weight:800;cursor:pointer;font-family:Nunito,sans-serif;font-size:14px}
.rv-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.rv-name{font-weight:700;color:#1a1a2e;flex:1}
.rv-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:100px;flex-shrink:0}
.rv-tag.want{background:#fef3c7;color:#92400e}
.rv-tag.been{background:#dcfce7;color:#14532d}
.rv-btn-s{background:none;border:1px solid #d1d5db;border-radius:5px;padding:2px 6px;font-size:9px;cursor:pointer;color:#6b7280;font-family:Inter,sans-serif;flex-shrink:0}
.ev-item{background:#f8faf5;border:1px solid #d4ecc0;border-radius:9px;padding:9px 11px;margin-bottom:7px;display:flex;gap:8px;align-items:center}
.ev-date-box{background:#2d6a2d;color:#fff;border-radius:7px;padding:4px 7px;font-size:10px;font-weight:800;text-align:center;flex-shrink:0;min-width:38px}
.ev-info{flex:1}
.ev-name{font-size:12px;font-weight:700;color:#1a1a2e}
.ev-venue{font-size:10px;color:#6b7280;margin-top:1px}
.ev-del{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:12px}
.add-ev-form{background:#f0f9e8;border:1px solid #d4ecc0;border-radius:9px;padding:10px;margin-top:8px;display:flex;flex-direction:column;gap:6px}
.ev-input{border:1.5px solid #d4ecc0;border-radius:7px;padding:7px 9px;font-family:Inter,sans-serif;font-size:12px;outline:none;color:#1a1a2e;width:100%}
.confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:5000;align-items:center;justify-content:center;padding:20px}
.confirm-modal.open{display:flex}
.confirm-box{background:#fff;border-radius:16px;padding:22px;max-width:300px;width:100%;text-align:center;box-shadow:0 16px 40px rgba(0,0,0,.2)}
.confirm-title{font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;color:#1a1a2e;margin-bottom:6px}
.confirm-msg{font-size:12px;color:#6b7280;margin-bottom:16px;line-height:1.5}
.confirm-btns{display:flex;gap:8px}
.cbtn{flex:1;border:none;border-radius:8px;padding:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer}
.cbtn.yes{background:#2d6a2d;color:#fff}.cbtn.no{background:#f3f4f6;color:#374151}
.add-panel{display:none;position:fixed;bottom:18px;right:14px;background:#fff;border-radius:16px;border:2px solid #d4ecc0;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:2000;width:300px;max-height:70vh;overflow-y:auto}
.add-panel.open{display:block}
.ap-title{font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;color:#1d4a1d;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.ap-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;margin:8px 0 5px}
.ap-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:6px}
.ap-item{background:#f8faf5;border:1.5px solid #d4ecc0;border-radius:8px;padding:7px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:.15s;font-size:9px;font-weight:700;color:#1d4a1d;text-align:center}
.ap-item:hover{border-color:#2d6a2d;background:#f0f9e8}
.ap-item .ap-icon{font-size:18px}
@media(max-width:600px){.ap-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>

var buildings,signs,decos;
function loadState(){
  try{buildings=JSON.parse(localStorage.getItem(SK));}catch(e){buildings=null;}
  if(!buildings||!buildings.length) buildings=JSON.parse(JSON.stringify(DEFAULT_BLDS));
  try{signs=JSON.parse(localStorage.getItem(SIGN_K));}catch(e){signs=null;}

  try{decos=JSON.parse(localStorage.getItem(DECO_K));}catch(e){decos=null;}
  if(!decos||!decos.length) decos=JSON.parse(JSON.stringify(DEFAULT_DECOS));
}
function save(){
  localStorage.setItem(SK,JSON.stringify(buildings));
  localStorage.setItem(SIGN_K,JSON.stringify(signs));
  localStorage.setItem(DECO_K,JSON.stringify(decos));
}
function resetTown(){if(!confirm('Reset town to default?'))return;localStorage.removeItem(SK);localStorage.removeItem(SIGN_K);localStorage.removeItem(DECO_K);location.reload();}
function getBld(id){return buildings.find(function(b){return b.id===id;});}

// ══════════════════════════════════════
// ZOOM + PAN
// ══════════════════════════════════════
var scale=0.55,panX=20,panY=10;
var W=2400,H=1800;

function applyTransform(showHUD){
  document.getElementById('world').style.transform='translate('+panX+'px,'+panY+'px) scale('+scale+')';
  if(showHUD!==false){
    var h=document.getElementById('zoom-hud');
    h.textContent=Math.round(scale*100)+'%';
    h.classList.add('show');
    clearTimeout(window._zh);window._zh=setTimeout(function(){h.classList.remove('show');},1200);
  }
}
var minScale=0.1; // will be set by zoomFit

function getFitScale(){
  var cv=document.getElementById('canvas').getBoundingClientRect();
  return Math.min((cv.width-4)/W,(cv.height-4)/H);
}
function zoom(d,cx,cy){
  var prev=scale;
  minScale=getFitScale();
  scale=Math.min(3,Math.max(minScale,scale+d));
  if(cx===undefined){var r=document.getElementById('canvas').getBoundingClientRect();cx=r.width/2;cy=r.height/2;}
  panX=cx-(cx-panX)*(scale/prev);
  panY=cy-(cy-panY)*(scale/prev);
  // Clamp pan so town never goes off screen
  clampPan();
  applyTransform();
}
function clampPan(){
  var cv=document.getElementById('canvas').getBoundingClientRect();
  var scaledW=W*scale, scaledH=H*scale;
  // Don't let town go fully off edges — keep at least 40px in view
  panX=Math.min(40,Math.max(cv.width-scaledW-4,panX));
  panY=Math.min(40,Math.max(cv.height-scaledH-4,panY));
}
function zoomFit(){
  var cv=document.getElementById('canvas').getBoundingClientRect();
  var sx=(cv.width-4)/W, sy=(cv.height-4)/H;
  scale=Math.min(sx,sy);
  minScale=scale;
  panX=(cv.width-W*scale)/2;
  panY=(cv.height-H*scale)/2;
  applyTransform();
}

// ══════════════════════════════════════
// INTERACTION — Pan / Long-press-drag / Double-tap-open
// ══════════════════════════════════════
var isPanning=false, panStart=null;
var lpTimer=null, lpBldId=null, lpStartX=0, lpStartY=0;
var liftedBld=null;  // building being dragged after long press
var lastTapMap={};   // id → timestamp of last tap
var LP_DELAY=550;    // ms to hold before drag starts
var MOVE_CANCEL=10;  // px movement before long press is cancelled
var DBL_TAP_MS=380;  // ms window for double tap

// Single global pointermove + pointerup
document.addEventListener('pointermove',function(e){
  // Cancel long press if finger moved too far
  if(lpTimer && (Math.abs(e.clientX-lpStartX)>MOVE_CANCEL || Math.abs(e.clientY-lpStartY)>MOVE_CANCEL)){
    clearTimeout(lpTimer);lpTimer=null;lpBldId=null;
    // Fall through to pan
    if(!isPanning&&panStart===null){
      isPanning=true;
      panStart={x:e.clientX-panX,y:e.clientY-panY};
      document.getElementById('canvas').classList.add('panning');
    }
  }
  if(isPanning&&panStart){panX=e.clientX-panStart.x;panY=e.clientY-panStart.y;clampPan();applyTransform(false);}
  if(liftedBld) moveLiftedBld(e);
  if(activeSignDrag) moveSignDrag(e);
  if(activeDecoDrag) moveDecoDrag(e);
});

document.addEventListener('pointerup',function(e){
  clearTimeout(lpTimer);lpTimer=null;lpBldId=null;
  if(isPanning){isPanning=false;panStart=null;document.getElementById('canvas').classList.remove('panning');}
  if(liftedBld) dropLiftedBld(e);
  if(activeSignDrag) endSignDrag(e);
  if(activeDecoDrag) endDecoDrag(e);
});

// Canvas background → pan
document.getElementById('canvas').addEventListener('pointerdown',function(e){
  var t=e.target;
  var onEmpty=t===e.currentTarget||t.id==='world'||t.classList.contains('road')||t.classList.contains('world-ground')||t.classList.contains('cross')||t.classList.contains('sidewalk')||t.classList.contains('park')||t.classList.contains('park-icon')||t.classList.contains('park-name');
  if(onEmpty){
    isPanning=true;panStart={x:e.clientX-panX,y:e.clientY-panY};
    document.getElementById('canvas').classList.add('panning');
  }
});

// Scroll wheel zoom
document.getElementById('canvas').addEventListener('wheel',function(e){e.preventDefault();zoom(e.deltaY<0?0.12:-0.15,e.clientX,e.clientY);},{passive:false});

// Pinch
var pinch0=null,pinchScale0=1;
document.getElementById('canvas').addEventListener('touchstart',function(e){if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinch0=Math.sqrt(dx*dx+dy*dy);pinchScale0=scale;}},{passive:true});
document.getElementById('canvas').addEventListener('touchmove',function(e){if(e.touches.length===2&&pinch0){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;var d=Math.sqrt(dx*dx+dy*dy);scale=Math.min(3,Math.max(getFitScale(),pinchScale0*(d/pinch0)));applyTransform();}},{passive:true});
document.getElementById('canvas').addEventListener('touchend',function(){pinch0=null;},{passive:true});

// ══════════════════════════════════════
// WIGGLE MODE (visual only — drag uses long-press directly)
// ══════════════════════════════════════
var wiggleMode=false;
function toggleWiggleMode(){wiggleMode?exitWiggleMode():enterWiggleMode();}
function enterWiggleMode(){
  wiggleMode=true;
  document.querySelectorAll('.bld').forEach(function(el){el.classList.add('wiggling');});
  document.querySelectorAll('.deco-el').forEach(function(el){el.classList.add('movable');});
  document.getElementById('wiggle-banner').classList.add('show');
  document.getElementById('wiggle-btn').classList.add('active');
  document.getElementById('wiggle-btn').textContent='✅ Done';
}
function exitWiggleMode(){
  wiggleMode=false;
  document.querySelectorAll('.bld').forEach(function(el){el.classList.remove('wiggling');});
  document.querySelectorAll('.deco-el').forEach(function(el){el.classList.remove('movable');});
  document.getElementById('wiggle-banner').classList.remove('show');
  document.getElementById('wiggle-btn').classList.remove('active');
  document.getElementById('wiggle-btn').textContent='✏️ Edit';
}

// ══════════════════════════════════════
// RENDER BUILDINGS
// ══════════════════════════════════════
function render(){
  var world=document.getElementById('world');
  world.querySelectorAll('.bld,.sign-wrap,.deco-el').forEach(function(el){el.remove();});
  buildings.forEach(renderBld);
  signs.forEach(renderSign);
  decos.forEach(renderDeco);
}

function renderBld(b){
  var el=document.createElement('div');
  el.className='bld'+(wiggleMode?' wiggling':'');
  el.id='bld-'+b.id;
  var w=b.w||120;
  el.style.cssText='left:'+b.x+'px;top:'+b.y+'px;width:'+w+'px;min-height:100px;background:'+b.bg+';border-color:'+b.bc+';color:'+b.co;
  var rc=b.rooms&&b.rooms.length?'<div class="bld-badge">'+b.rooms.length+' rooms</div>':'';
  el.innerHTML='<div class="bld-delete" onclick="deleteBld(event,\''+b.id+'\')">−</div>'
    +'<div class="bld-roof" style="background:'+b.roof+'"></div>'
    +'<div class="bld-icon">'+b.icon+'</div>'
    +'<div class="bld-name">'+b.name+'</div>'
    +(b.desc?'<div class="bld-sub">'+b.desc+'</div>':'')
    +rc
    +'<div class="bld-shadow"></div>'
    +'<div class="bld-resize" onpointerdown="startResize(event,\''+b.id+'\')"></div>';
  el.addEventListener('pointerdown',function(e){onBldDown(e,b.id);});
  document.getElementById('world').appendChild(el);
}

// ══════════════════════════════════════
// BUILDING INTERACTION
// Double-tap = open · Long-press+slide = move
// ══════════════════════════════════════
var dropTarget=null;

function worldPt(cx,cy){
  var wr=document.getElementById('world').getBoundingClientRect();
  return{x:(cx-wr.left)/scale,y:(cy-wr.top)/scale};
}

function onBldDown(e,id){
  if(e.target.classList.contains('bld-delete')||e.target.classList.contains('bld-resize')) return;
  e.stopPropagation();e.preventDefault();
  // Stop any pan
  isPanning=false;panStart=null;

  var el=document.getElementById('bld-'+id);
  var wp=worldPt(e.clientX,e.clientY);
  var bx=parseFloat(el.style.left)||0, by=parseFloat(el.style.top)||0;

  lpStartX=e.clientX; lpStartY=e.clientY; lpBldId=id;

  // Double-tap detection
  var now=Date.now();
  if(lastTapMap[id] && (now-lastTapMap[id])<DBL_TAP_MS){
    lastTapMap[id]=0;
    clearTimeout(lpTimer);lpTimer=null;lpBldId=null;
    openBld(id);
    return;
  }
  lastTapMap[id]=now;

  // Start long-press timer for drag
  clearTimeout(lpTimer);
  lpTimer=setTimeout(function(){
    lpTimer=null;
    // Lift the building
    var offX=wp.x-bx, offY=wp.y-by;
    liftedBld={id:id,el:el,offX:offX,offY:offY};
    el.classList.add('lifted');
    if(wiggleMode) el.classList.remove('wiggling');
    if(navigator.vibrate) navigator.vibrate(40);
    // Show drop hint
    document.getElementById('wiggle-banner').textContent='📦 Drag to move · Drop on another to nest inside';
    document.getElementById('wiggle-banner').classList.add('show');
  }, LP_DELAY);
}

function moveLiftedBld(e){
  var lb=liftedBld;
  var wp=worldPt(e.clientX,e.clientY);
  lb.el.style.left=(wp.x-lb.offX)+'px';
  lb.el.style.top=(wp.y-lb.offY)+'px';
  // Drop target detection
  var hit=null;
  buildings.forEach(function(b){
    if(b.id===lb.id) return;
    var te=document.getElementById('bld-'+b.id);if(!te) return;
    var tr=te.getBoundingClientRect();
    if(e.clientX>=tr.left&&e.clientX<=tr.right&&e.clientY>=tr.top&&e.clientY<=tr.bottom) hit=b.id;
    te.style.outline='';
  });
  if(hit){document.getElementById('bld-'+hit).style.outline='3px dashed #f59e0b';dropTarget=hit;}
  else dropTarget=null;
}

function dropLiftedBld(e){
  var lb=liftedBld; liftedBld=null;
  lb.el.classList.remove('lifted');
  buildings.forEach(function(b){var te=document.getElementById('bld-'+b.id);if(te)te.style.outline='';});
  if(wiggleMode) lb.el.classList.add('wiggling');
  document.getElementById('wiggle-banner').classList.remove('show');

  if(dropTarget){
    var dragged=getBld(lb.id), target=getBld(dropTarget);
    showConfirm('Add as room?','"'+dragged.name+'" becomes a room inside "'+target.name+'".',function(){
      if(!target.rooms) target.rooms=[];
      target.rooms.push({id:dragged.id,icon:dragged.icon,name:dragged.name,desc:dragged.desc||'',url:dragged.url});
      buildings=buildings.filter(function(b){return b.id!==dragged.id;});
      save();render();
    });
    var b=getBld(lb.id);if(b){lb.el.style.left=b.x+'px';lb.el.style.top=b.y+'px';}
  } else {
    var wp=worldPt(e.clientX,e.clientY);
    var b=getBld(lb.id);
    if(b){b.x=Math.round(wp.x-lb.offX);b.y=Math.round(wp.y-lb.offY);}
    save();
  }
  dropTarget=null;
}

var resizeState=null;
window.startResize=function(e,id){
  e.stopPropagation();e.preventDefault();
  var b=getBld(id);if(!b) return;
  resizeState={id:id,startX:e.clientX,startW:b.w||120};
  function onMove(ev){
    var dx=(ev.clientX-resizeState.startX)/scale;
    var newW=Math.max(80,Math.min(220,resizeState.startW+dx));
    var b2=getBld(resizeState.id);if(b2)b2.w=Math.round(newW);
    var el=document.getElementById('bld-'+resizeState.id);
    if(el)el.style.width=newW+'px';
  }
  function onUp(){document.removeEventListener('pointermove',onMove);document.removeEventListener('pointerup',onUp);save();}
  document.addEventListener('pointermove',onMove);
  document.addEventListener('pointerup',onUp);
};

// DELETE
window.deleteBld=function(e,id){
  e.stopPropagation();e.preventDefault();
  if(!confirm('Remove this building from the map?')) return;
  buildings=buildings.filter(function(b){return b.id!==id;});

};

var modalBldId=null;
function openBld(id){
  var b=getBld(id);if(!b) return;
  // Special buildings
  if(id==='civil-eng'){openCivilEng();return;}
  if(id==='restaurants'){openDowntown('restaurants');return;}
  if(id==='venues'){openDowntown('venues');return;}
  if(id==='this-month'){openDowntown('this-month');return;}
  var rooms=b.rooms&&b.rooms.length?b.rooms:[];
  if(rooms.length===1&&rooms[0].url){window.open(rooms[0].url,'_self');return;}
  if(!rooms.length&&b.url){window.open(b.url,'_self');return;}
  modalBldId=id;
  document.getElementById('modal-icon').textContent=b.icon;
  document.getElementById('modal-name').textContent=b.name;
  document.getElementById('modal-hdr').style.background=b.bg||'#f8fafc';
  buildModalBody(b);
  document.getElementById('bld-modal').classList.add('open');
}
function buildModalBody(b){
  var rooms=b.rooms&&b.rooms.length?b.rooms:[];
  var html='';
  if(b.url&&!rooms.length){
    html='<a href="'+b.url+'" class="room-btn"><span class="room-icon">'+b.icon+'</span><div><div class="room-name">Open '+b.name+'</div></div></a>';
  } else {
    html=rooms.map(function(r){
      return '<div class="room-btn" style="display:flex;align-items:center">'
        +'<a href="'+(r.url||'#')+'" style="display:flex;align-items:center;gap:10px;flex:1;text-decoration:none">'
        +'<span class="room-icon">'+r.icon+'</span>'
        +'<div><div class="room-name">'+r.name+'</div>'+(r.desc?'<div class="room-desc">'+r.desc+'</div>':'')+'</div>'
        +'</a>'
        +'<button class="room-eject" onclick="ejectRoom(\''+b.id+'\',\''+r.id+'\')">↩</button>'
        +'</div>';
    }).join('');
  }
  var notes=loadNotes(b.id);
  html+='<div class="modal-divider"></div>'
    +'<div class="modal-label">Notes</div>'
    +'<textarea class="note-ta" id="note-ta" placeholder="Add a note..."></textarea>'
    +'<button class="note-add" onclick="addNote(\''+b.id+'\')">+ Add</button>'
    +(notes.length?'<div style="margin-top:8px">'+notes.map(function(n,i){
      return '<div class="note-entry"><span style="flex:1">'+n+'</span><button class="note-del" onclick="delNote(\''+b.id+'\','+i+')">✕</button></div>';
    }).join('')+'</div>':'');
  document.getElementById('modal-body').innerHTML=html;
}
window.ejectRoom=function(pid,rid){
  var p=getBld(pid);var r=p.rooms.find(function(x){return x.id===rid;});
  if(!r) return;
  var nb=JSON.parse(JSON.stringify(r));nb.x=(p.x||0)+150;nb.y=p.y||0;nb.rooms=[];nb.bg=nb.bg||'#f3f4f6';nb.bc=nb.bc||'#9ca3af';nb.co=nb.co||'#374151';nb.roof=nb.roof||'#6b7280';nb.w=110;
  buildings.push(nb);p.rooms=p.rooms.filter(function(x){return x.id!==rid;});
  save();render();closeModal();
};

function renderSign(s){
  var el=document.createElement('div');
  el.className='sign-wrap';el.id='sign-'+s.id;
  el.style.cssText='left:'+s.x+'px;top:'+s.y+'px';
  el.innerHTML='<div class="sign-board '+(s.style||'')+'" id="sb-'+s.id+'">'+s.name+'</div><div class="sign-post"></div>';
  el.querySelector('.sign-board').addEventListener('dblclick',function(e){e.stopPropagation();editSign(s.id);});
  el.addEventListener('pointerdown',function(e){onSignDown(e,s.id);});
  document.getElementById('world').appendChild(el);
}
var activeSignDrag=null;
function onSignDown(e,id){e.stopPropagation();e.preventDefault();var el=document.getElementById('sign-'+id);var wr=document.getElementById('world').getBoundingClientRect();var bx=parseFloat(el.style.left),by=parseFloat(el.style.top);activeSignDrag={id:id,el:el,offX:(e.clientX-wr.left)/scale-bx,offY:(e.clientY-wr.top)/scale-by,moved:false};}
function moveSignDrag(e){var ds=activeSignDrag;if(!ds.moved&&Math.abs(e.clientX)<4)return;ds.moved=true;var wp=worldPt(e.clientX,e.clientY);ds.el.style.left=(wp.x-ds.offX)+'px';ds.el.style.top=(wp.y-ds.offY)+'px';}
function endSignDrag(e){var ds=activeSignDrag;activeSignDrag=null;if(!ds.moved) return;var wp=worldPt(e.clientX,e.clientY);var s=signs.find(function(x){return x.id===ds.id;});if(s){s.x=Math.round(wp.x-ds.offX);s.y=Math.round(wp.y-ds.offY);}save();}
function editSign(id){var s=signs.find(function(x){return x.id===id;});if(!s)return;var n=prompt('Street name:',s.name);if(n===null) return;s.name=n.toUpperCase();save();document.getElementById('sb-'+id).textContent=s.name;}
function addSign(){var n=prompt('New street name:','MY STREET');if(!n) return;var s={id:'s'+Date.now(),name:n.toUpperCase(),x:500,y:400,style:''};signs.push(s);save();renderSign(s);}

var activeDecoDrag=null;
function onDecoDown(e,id){e.stopPropagation();e.preventDefault();var el=document.getElementById('deco-'+id);var wp=worldPt(e.clientX,e.clientY);var bx=parseFloat(el.style.left),by=parseFloat(el.style.top);activeDecoDrag={id:id,el:el,offX:wp.x-bx,offY:wp.y-by};}
function moveDecoDrag(e){var ds=activeDecoDrag;var wp=worldPt(e.clientX,e.clientY);ds.el.style.left=(wp.x-ds.offX)+'px';ds.el.style.top=(wp.y-ds.offY)+'px';ds.el.classList.add('drag-active');}
function endDecoDrag(e){var ds=activeDecoDrag;activeDecoDrag=null;ds.el.classList.remove('drag-active');var wp=worldPt(e.clientX,e.clientY);var d=decos.find(function(x){return x.id===ds.id;});if(d){d.x=Math.round(wp.x-ds.offX);d.y=Math.round(wp.y-ds.offY);}save();}

var BOARDS={office:{n:'The Office',bg:'#dbeafe',co:'#1e3a8a'},finance:{n:'Wall Street',bg:'#fef3c7',co:'#78350f'},family:{n:'Family Square',bg:'#dcfce7',co:'#14532d'},recovery:{n:'Recovery Village',bg:'#ede9fe',co:'#4c1d95'},health:{n:'Emergency District',bg:'#fee2e2',co:'#7f1d1d'},downtown:{n:'Downtown Greenville',bg:'#dbeafe',co:'#1e3a8a'}};
function loadTasks(b){try{return JSON.parse(localStorage.getItem('tasks_'+b)||'[]');}catch(e){return[];}}
function saveTasks(b,t){localStorage.setItem('tasks_'+b,JSON.stringify(t));}
function openBulletin(board){
  var b=BOARDS[board];
  document.getElementById('modal-icon').textContent='📌';
  document.getElementById('modal-name').textContent=b.n+' — Board';
  document.getElementById('modal-hdr').style.background=b.bg;
  document.getElementById('modal-hdr').querySelector('.modal-hdr-name').style.color=b.co;

function buildBulletinBody(board){
  var tasks=loadTasks(board);
  var today=new Date().toISOString().split('T')[0];
  tasks.sort(function(a,b){return(a.due||'9999')>(b.due||'9999')?1:-1;});
  var dtag=function(due){if(!due)return '';if(due<=today)return '<span class="task-due today">TODAY</span>';var d=new Date(due),n=new Date();if((d-n)<3*86400000)return '<span class="task-due soon">SOON</span>';return '<span class="task-due ok">'+due+'</span>';};
  var html='<div>'+( tasks.length?tasks.map(function(t,i){return '<div class="task-item'+(t.done?' done':'')+'" onclick="toggleTask(\''+board+'\','+i+')">'+'<div class="task-cb">'+(t.done?'✓':'')+'</div><div class="task-text">'+t.text+'</div>'+dtag(t.due)+'<button onclick="event.stopPropagation();delTask(\''+board+'\','+i+')" style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:11px">✕</button></div>'}).join(''):'<div style="font-size:12px;color:#9ca3af;text-align:center;padding:12px">No tasks yet.</div>')+'</div>'+'<div class="task-add-row"><input class="task-input" id="task-text-'+board+'" placeholder="New task..." onkeydown="if(event.key===\'Enter\')addTask(\''+board+'\')"><input type="date" class="task-date" id="task-date-'+board+'"><button class="task-add-btn" onclick="addTask(\''+board+'\')">+</button></div>';
  document.getElementById('modal-body').innerHTML=html;
  var de=document.getElementById('task-date-'+board);if(de)de.value=today;
}
window.addTask=function(b){var t=document.getElementById('task-text-'+b),d=document.getElementById('task-date-'+b);if(!t||!t.value.trim())return;var tasks=loadTasks(b);tasks.push({text:t.value.trim(),due:d?d.value:'',done:false});saveTasks(b,tasks);t.value='';buildBulletinBody(b);};
window.toggleTask=function(b,i){var t=loadTasks(b);t[i].done=!t[i].done;saveTasks(b,t);buildBulletinBody(b);};
window.delTask=function(b,i){var t=loadTasks(b);t.splice(i,1);saveTasks(b,t);buildBulletinBody(b);};

function exportTown(){var data={buildings:buildings,signs:signs,decos:decos};var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='my_town.json';a.click();}
function importTown(){var inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=function(e){var f=e.target.files[0];if(!f) return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.buildings){buildings=d.buildings;signs=d.signs||signs;decos=d.decos||decos;save();render();closeModal();}}catch(err){alert('Invalid file');}};r.readAsText(f);};inp.click();}

var confirmCb=null;
function showConfirm(title,msg,cb){document.getElementById('confirm-title').textContent=title;document.getElementById('confirm-msg').textContent=msg;confirmCb=cb;document.getElementById('confirm-yes').onclick=function(){confirmCb&&confirmCb();cancelConfirm();};document.getElementById('confirm-modal').classList.add('open');}
function cancelConfirm(){document.getElementById('confirm-modal').classList.remove('open');confirmCb=null;}

var BLD_PRESETS=[
  {icon:'🏠',name:'House',bg:'#dcfce7',bc:'#4ade80',co:'#14532d',roof:'#16a34a'},
  {icon:'🏢',name:'Office',bg:'#dbeafe',bc:'#3b82f6',co:'#1e3a8a',roof:'#2563eb'},
  {icon:'❤️',name:'Personal',bg:'#fce7f3',bc:'#f9a8d4',co:'#9d174d',roof:'#db2777'},
  {icon:'📋',name:'Project',bg:'#f3f4f6',bc:'#9ca3af',co:'#374151',roof:'#6b7280'},
  {icon:'⭐',name:'Favorite',bg:'#fef9c3',bc:'#fde047',co:'#713f12',roof:'#ca8a04'},
  {icon:'🏪',name:'Shop',bg:'#fed7aa',bc:'#fb923c',co:'#7c2d12',roof:'#ea580c'},
  {icon:'🏥',name:'Health',bg:'#fee2e2',bc:'#f87171',co:'#7f1d1d',roof:'#dc2626'},
  {icon:'⚙️',name:'Tool',bg:'#e0e7ff',bc:'#a5b4fc',co:'#312e81',roof:'#4338ca'},
];
var DECO_PRESETS=[
  {icon:'🌳',n:'Oak'},{icon:'🌲',n:'Pine'},{icon:'🌴',n:'Palm'},{icon:'🌿',n:'Bush'},
  {icon:'🌸',n:'Cherry'},{icon:'🌺',n:'Flower'},{icon:'🌻',n:'Sunflower'},{icon:'🌵',n:'Cactus'},
  {icon:'🐕',n:'Dog'},{icon:'🐶',n:'Puppy'},{icon:'🦮',n:'Guide Dog'},{icon:'🐈',n:'Cat'},
  {icon:'🦆',n:'Duck'},{icon:'🐦',n:'Bird'},{icon:'🦋',n:'Butterfly'},{icon:'🪴',n:'Plant'},
  {icon:'⛺',n:'Tent'},{icon:'🪑',n:'Bench'},{icon:'💦',n:'Fountain'},{icon:'🗿',n:'Statue'},
];
var SIGN_PRESETS=[
  {n:'GREEN',style:''},{n:'RED',style:'red-sign'},{n:'BLUE',style:'blue-sign'},
];

function toggleAddPanel(){
  var p=document.getElementById('add-panel');p.classList.toggle('open');
  if(!p.classList.contains('open')) return;
  document.getElementById('ap-buildings').innerHTML=BLD_PRESETS.map(function(b,i){return '<div class="ap-item" onclick="addBld('+i+')"><div class="ap-icon">'+b.icon+'</div><div>'+b.name+'</div></div>';}).join('');
  document.getElementById('ap-decos').innerHTML=DECO_PRESETS.map(function(d,i){return '<div class="ap-item" onclick="addDeco('+i+')"><div class="ap-icon">'+d.icon+'</div><div>'+d.n+'</div></div>';}).join('');
  document.getElementById('ap-signs').innerHTML=SIGN_PRESETS.map(function(s,i){return '<div class="ap-item" onclick="addSignPreset('+i+')"><div class="ap-icon" style="font-size:12px;font-weight:900;color:'+(s.style==='red-sign'?'#dc2626':s.style==='blue-sign'?'#1d4ed8':'#1a6b1a')+'">🪧</div><div>'+s.n+'</div></div>';}).join('');
}
window.addBld=function(i){
  var p=BLD_PRESETS[i];var n=prompt('Building name:',p.name);if(!n) return;var u=prompt('Link URL (or blank):','');
  var b=JSON.parse(JSON.stringify(p));b.id='b'+Date.now();b.name=n;b.url=u||'';b.rooms=[];b.x=530;b.y=600;b.w=120;
  buildings.push(b);save();renderBld(b);toggleAddPanel();
};
window.addDeco=function(i){
  var p=DECO_PRESETS[i];var d={id:'d'+Date.now(),icon:p.icon,x:530,y:600};
  decos.push(d);save();renderDeco(d);toggleAddPanel();
};
window.addSignPreset=function(i){
  var ps=SIGN_PRESETS[i];var n=prompt('Street name:','MY STREET');if(!n) return;
  var s={id:'s'+Date.now(),name:n.toUpperCase(),x:500,y:400,style:ps.style};
  signs.push(s);save();renderSign(s);toggleAddPanel();
};
